<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <style>
    /* La fuente declarada NO existe: el render debe ABORTAR, nunca degradar a fallback. */
    @font-face { font-family: 'FantasmaSans'; src: url('fonts/no-existe.ttf') format('truetype'); }
    html, body { width:400px; height:300px; }
    .slide { position:relative; width:400px; height:300px; overflow:hidden; background:#eee; }
    .title { font-family:'FantasmaSans', sans-serif; font-size:32px; }
  </style>
</head>
<body>
  <main class="slide" data-template="BrokenFontCard">
    <h1 class="title" data-slot="title" data-slot-type="string">Título</h1>
  </main>
</body>
</html>
