<!doctype html>
<html lang="es"><head>  <link rel="stylesheet" href="deck-tokens.css">
<meta charset="utf-8"><link rel="stylesheet" href="deck-signature.css">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,600;1,600&family=Geist:wght@400;600&display=swap');
  * { margin:0; padding:0; box-sizing:border-box; }
  html,body { width:1920px; height:1080px; }
  body { font-family:'Geist',sans-serif; overflow:hidden; }

  :root { --safe:72px; --teal:var(--axis-deck-teal-500); --teal-deep:var(--axis-deck-teal-750); --violet:var(--axis-ppt-indigo-600); --ink:var(--axis-ppt-indigo-950); --panel-bg:var(--axis-deck-recipe-light-surface); }
  .slide { position:relative; width:1920px; height:1080px; display:flex; background:var(--panel-bg); }

  /* ===== LEFT: panel de marca — intro del squad ===== */
  .brand {
    position:relative; width:812px; flex:none; height:1080px; overflow:hidden;
    border-top-right-radius:64px; border-bottom-right-radius:64px;
    padding:var(--safe) 70px; display:flex; flex-direction:column; justify-content:center; gap:30px; color:var(--axis-ppt-neutral-50);
    background:
      radial-gradient(rgba(var(--axis-ppt-neutral-50-rgb), .09) .55px, transparent .8px) 0 0 / 5px 5px,
      radial-gradient(60% 60% at 0% 8%, rgba(var(--axis-deck-teal-550-rgb), .46) 0%, rgba(var(--axis-deck-teal-550-rgb), .14) 36%, transparent 64%),
      radial-gradient(66% 60% at 4% 104%, rgba(var(--axis-deck-violet-550-rgb), .42) 0%, rgba(var(--axis-deck-violet-550-rgb), .12) 44%, transparent 74%),
      linear-gradient(226deg, var(--axis-deck-navy-800) 0%, var(--axis-deck-navy-860) 44%, var(--axis-deck-navy-920) 100%);
  }
  .eyebrow { font-weight:600; font-size:20px; letter-spacing:.10em; text-transform:uppercase; color:var(--teal); margin-bottom:16px; }
  .headline { font-family:'Poppins',sans-serif; font-weight:600; font-size:50px; line-height:1.08; letter-spacing:-.018em; color:var(--axis-ppt-neutral-50); }
  .headline em { font-style:italic; color:var(--teal); }
  .lead { font-size:24px; line-height:1.45; color:rgba(var(--axis-ppt-neutral-50-rgb), .82); max-width:600px; }
  .hl { margin-top:8px; background:rgba(var(--axis-ppt-neutral-50-rgb), .08); border:1px solid rgba(var(--axis-ppt-neutral-50-rgb), .16); border-radius:20px; padding:26px 30px; max-width:620px; }
  .hl p { font-family:'Poppins',sans-serif; font-weight:600; font-size:24px; line-height:1.3; color:var(--axis-ppt-neutral-50); }
  .hl em { font-style:italic; color:var(--teal); }

  /* ===== RIGHT: roster de tarjetas (bloque cohesivo, centrado) ===== */
  .roster { flex:1; height:1080px; padding:var(--safe) 76px; display:flex; flex-direction:column; justify-content:center; }
  .rhead { display:flex; align-items:baseline; gap:16px; margin-bottom:28px; }
  .rhead .k { font-family:'Geist',sans-serif; font-weight:600; font-size:20px; letter-spacing:.10em; text-transform:uppercase; color:var(--violet); opacity:.8; }
  .rhead .s { font-size:18px; color:var(--axis-deck-steel-450); }
  .members { display:flex; flex-direction:column; gap:20px; }
  .member { background:var(--axis-ppt-neutral-50); border:1px solid rgba(var(--axis-ppt-indigo-950-rgb), .06); border-radius:18px;
    box-shadow:0 12px 28px rgba(var(--axis-deck-navy-900-rgb), .08); display:flex; align-items:center; gap:24px; padding:28px 30px; }
  .av { width:60px; height:60px; flex:none; border-radius:50%;
    background:linear-gradient(150deg, var(--axis-deck-teal-660) 0%, var(--teal-deep) 100%);
    box-shadow:0 8px 18px rgba(var(--axis-deck-teal-750-rgb), .32), inset 0 1px 0 rgba(var(--axis-ppt-neutral-50-rgb), .3);
    display:grid; place-items:center; color:var(--axis-ppt-neutral-50); }
  .av svg { width:31px; height:31px; display:block; }
  /* jerarquía: ROL domina · descripción segunda · dedicación = dato tabular (columna derecha) */
  .m { flex:1; }
  .role { font-family:'Poppins',sans-serif; font-weight:600; font-size:25px; line-height:1.05; letter-spacing:-.01em; color:var(--ink); }
  .rdesc { font-size:15px; line-height:1.3; color:var(--axis-deck-steel-550); margin-top:5px; }
  .ded { flex:none; text-align:right; min-width:96px; }
  .ded .pct { font-family:'Geist',sans-serif; font-weight:600; font-size:28px; line-height:1; color:var(--violet); font-variant-numeric:tabular-nums; letter-spacing:-.01em; }
  .ded .lbl { font-size:11px; letter-spacing:.06em; text-transform:uppercase; color:var(--axis-deck-steel-400); margin-top:5px; }
</style></head>
<body>
  <div class="slide" data-template="TeamSplit">
    <!-- LEFT -->
    <div class="brand" data-url-bubble-backdrop>
      <div>
        <div class="eyebrow" data-slot="sectionLabel" data-slot-type="string">El equipo</div>
        <h1 class="headline" data-slot="headline" data-slot-type="rich-string" data-slot-required="true">Un squad dedicado, con un <em>responsable único</em></h1>
      </div>
      <p class="lead" data-slot="lead" data-slot-type="rich-string" data-slot-required="true">El mismo equipo de punta a punta — sin rotación y sin compartir tu cuenta con otras marcas.</p>
      <div class="hl"><p data-slot="highlight" data-slot-type="rich-string" data-slot-required="true">5 roles enfocados en SKY. Un solo responsable que <em>responde por todo</em>.</p></div>
      <img class="deck-url-bubble signature-TeamSplit" src="assets/url-lum.svg" alt="efeoncepro.com">
    </div>

    <!-- RIGHT: roster -->
    <div class="roster">
      <div class="rhead"><span class="k" data-slot="rosterLabel" data-slot-type="string">El squad</span><span class="s" data-slot="rosterMeta" data-slot-type="string">5 roles · 1 responsable único</span></div>
      <div class="members" id="members" data-slot="members" data-slot-type="array" data-slot-required="true"></div>
    </div>
  </div>

<script>
  const I = {
    star:'<path fill="currentColor" d="M9.153 5.408C10.42 3.136 11.053 2 12 2s1.58 1.136 2.847 3.408l.328.588c.36.646.54.969.82 1.182s.63.292 1.33.45l.636.144c2.46.557 3.689.835 3.982 1.776c.292.94-.546 1.921-2.223 3.882l-.434.507c-.476.557-.715.836-.822 1.18c-.107.345-.071.717.001 1.46l.066.677c.253 2.617.38 3.925-.386 4.506s-1.918.051-4.22-1.009l-.597-.274c-.654-.302-.981-.452-1.328-.452s-.674.15-1.328.452l-.596.274c-2.303 1.06-3.455 1.59-4.22 1.01c-.767-.582-.64-1.89-.387-4.507l.066-.676c.072-.744.108-1.116 0-1.46c-.106-.345-.345-.624-.821-1.18l-.434-.508c-1.677-1.96-2.515-2.941-2.223-3.882S3.58 8.328 6.04 7.772l.636-.144c.699-.158 1.048-.237 1.329-.45s.46-.536.82-1.182z"/>',
    magnifer:'<path fill="currentColor" fill-rule="evenodd" d="M21.788 21.788a.723.723 0 0 0 0-1.022L18.122 17.1a9.157 9.157 0 1 0-1.022 1.022l3.666 3.666a.723.723 0 0 0 1.022 0" clip-rule="evenodd"/>',
    pen:'<path fill="currentColor" d="M21.194 2.806a2.753 2.753 0 0 1 0 3.893l-.496.496a5 5 0 0 1-.533-.151a5.2 5.2 0 0 1-1.968-1.241a5.2 5.2 0 0 1-1.241-1.968a5 5 0 0 1-.15-.533l.495-.496a2.753 2.753 0 0 1 3.893 0M14.58 13.313c-.404.404-.606.606-.829.78a4.6 4.6 0 0 1-.848.524c-.255.121-.526.211-1.068.392l-2.858.953a.742.742 0 0 1-.939-.94l.953-2.857c.18-.542.27-.813.392-1.068q.217-.453.524-.848c.174-.223.376-.425.78-.83l4.916-4.915a6.7 6.7 0 0 0 1.533 2.36a6.7 6.7 0 0 0 2.36 1.533z"/><path fill="currentColor" d="M20.536 20.536C22 19.07 22 16.714 22 12c0-1.548 0-2.842-.052-3.934l-6.362 6.362c-.351.352-.615.616-.912.847a6 6 0 0 1-1.125.696c-.34.162-.694.28-1.166.437l-2.932.977a2.242 2.242 0 0 1-2.836-2.836l.977-2.932c.157-.472.275-.826.437-1.166q.287-.6.696-1.125c.231-.297.495-.56.847-.912l6.362-6.362C14.842 2 13.548 2 12 2C7.286 2 4.929 2 3.464 3.464C2 4.93 2 7.286 2 12s0 7.071 1.464 8.535C4.93 22 7.286 22 12 22s7.071 0 8.535-1.465"/>',

    chart:'<path fill="currentColor" d="M17.293 2.293C17 2.586 17 3.057 17 4v13c0 .943 0 1.414.293 1.707S18.057 19 19 19s1.414 0 1.707-.293S21 17.943 21 17V4c0-.943 0-1.414-.293-1.707S19.943 2 19 2s-1.414 0-1.707.293M10 7c0-.943 0-1.414.293-1.707S11.057 5 12 5s1.414 0 1.707.293S14 6.057 14 7v10c0 .943 0 1.414-.293 1.707S12.943 19 12 19s-1.414 0-1.707-.293S10 17.943 10 17zM3.293 9.293C3 9.586 3 10.057 3 11v6c0 .943 0 1.414.293 1.707S4.057 19 5 19s1.414 0 1.707-.293S7 17.943 7 17v-6c0-.943 0-1.414-.293-1.707S5.943 9 5 9s-1.414 0-1.707.293M3 21.25a.75.75 0 0 0 0 1.5h18a.75.75 0 0 0 0-1.5z"/>'
  };
  const team = [
    ['star','Lead de cuenta','responsable único y punto de contacto.','40'],
    ['magnifer','Estratega SEO + AEO','diseña la estrategia de visibilidad.','50'],
    ['pen','Editor de contenidos','dirige la producción del blog.','60'],
    ['settings','Especialista técnico','WordPress, schema y performance.','30'],
    ['chart','Analista de datos','medición, Share of Voice y reportería.','40']
  ];
  document.getElementById('members').innerHTML = team.map(([ic,role,desc,pct]) =>
    `<div class="member"><div class="av"><svg viewBox="0 0 24 24">${I[ic]}</svg></div>`
    + `<div class="m"><div class="role" data-slot-field="role">${role}</div><div class="rdesc" data-slot-field="description">${desc}</div></div>`
    + `<div class="ded"><div class="pct" data-slot-field="dedication">${pct}%</div><div class="lbl">dedicación</div></div>
  </div>`).join('');
</script>
</body></html>
