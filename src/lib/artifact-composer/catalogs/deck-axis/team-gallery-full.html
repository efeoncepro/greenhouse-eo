<!doctype html>
<html lang="es"><head>  <link rel="stylesheet" href="deck-fonts.css">
  <link rel="stylesheet" href="deck-tokens.css">
  <link rel="stylesheet" href="deck-mold.css">
<meta charset="utf-8"><link rel="stylesheet" href="deck-signature.css">
<style>

  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:var(--axis-deck-type-text); overflow:hidden; }

  :root { --safe:72px; --teal:var(--axis-deck-teal-500); --violet:var(--axis-ppt-indigo-600); --ink:var(--axis-ppt-indigo-950); }

  /* Canvas navy: el MISMO fondo aprobado de TimelineFull (declarado en gradient-inventory). */
  .slide { padding:var(--safe) var(--safe) 110px;
    display:flex; flex-direction:column; justify-content:center; color:var(--axis-ppt-neutral-50);
    background:
      radial-gradient(rgba(var(--axis-ppt-neutral-50-rgb), .07) .55px, transparent .8px) 0 0 / 5px 5px,
      radial-gradient(52% 60% at 100% 0%, rgba(var(--axis-deck-teal-550-rgb), .5) 0%, rgba(var(--axis-deck-teal-550-rgb), .16) 38%, transparent 66%),
      radial-gradient(50% 55% at 0% 104%, rgba(var(--axis-deck-violet-550-rgb), .5) 0%, rgba(var(--axis-deck-violet-550-rgb), .16) 42%, transparent 70%),
      linear-gradient(226deg, var(--axis-deck-navy-800) 0%, var(--axis-deck-navy-860) 44%, var(--axis-deck-navy-920) 100%);
  }

  /* ===== Cabecera ===== */
  .head { display:flex; align-items:flex-end; justify-content:space-between; gap:40px; }
  .eyebrow { font-weight:600; font-size:20px; letter-spacing:.10em; text-transform:uppercase; color:var(--teal); margin-bottom:14px; }
  .title { font-family:var(--axis-deck-type-display); font-weight:600; font-size:52px; line-height:1.08; letter-spacing:-.018em; max-width:1150px; }
  .title em { font-style:italic; color:var(--teal); }
  .meta { flex:none; font-size:18px; font-weight:600; letter-spacing:.02em; color:rgba(var(--axis-ppt-neutral-50-rgb), .78);
    background:rgba(var(--axis-ppt-neutral-50-rgb), .08); border:1px solid rgba(var(--axis-ppt-neutral-50-rgb), .16);
    border-radius:999px; padding:12px 26px; margin-bottom:6px; }

  /* ===== Roster de fotos ===== */
  .members { display:flex; gap:26px; margin-top:46px; align-items:stretch; }
  .card { flex:1 1 0; min-width:0; background:var(--axis-ppt-neutral-50); border-radius:22px; overflow:hidden;
    display:flex; flex-direction:column;
    box-shadow:0 18px 44px rgba(var(--axis-deck-navy-920-rgb), .38); }
  /* FOTO REAL del squad (resolver squad-person, allowlist cerrada). NUNCA una cara generada por IA.
     Las fotos son los avatares CANÓNICOS de Entra/Greenhouse: cuadradas, full-bleed, con su propio
     degradado de marca de fondo — se usan TAL CUAL (no recortes). El lavado ice queda solo como
     fallback si un asset viniera con transparencia. */
  .photo { aspect-ratio:1 / 1; width:100%; overflow:hidden; flex:none;
    background:linear-gradient(180deg, rgba(var(--axis-deck-ice-200-rgb), .55) 0%, rgba(var(--axis-deck-ice-200-rgb), .14) 78%, rgba(var(--axis-deck-ice-200-rgb), .04) 100%); }
  .photo img { width:100%; height:100%; object-fit:cover; object-position:center; display:block; }
  .info { padding:22px 24px 24px; display:flex; flex-direction:column; flex:1; }
  .role { font-family:var(--axis-deck-type-display); font-weight:600; font-size:22px; line-height:1.12; letter-spacing:-.012em; color:var(--ink); }
  .name { font-size:15px; line-height:1.3; color:var(--axis-deck-steel-550); margin-top:6px; }
  .ded { display:flex; align-items:baseline; gap:8px; margin-top:auto; padding-top:14px; }
  .ded .pct { font-family:var(--axis-deck-type-text); font-weight:600; font-size:24px; line-height:1; color:var(--violet); font-variant-numeric:tabular-nums; letter-spacing:-.01em; }
  .ded .lbl { font-size:11px; letter-spacing:.06em; text-transform:uppercase; color:var(--axis-deck-steel-400); }
</style></head>
<body>
  <div class="slide" data-template="TeamGalleryFull" data-url-bubble-backdrop>
    <div class="head">
      <div>
        <div class="eyebrow" data-slot="sectionLabel" data-slot-type="string">El equipo</div>
        <h1 class="title" data-slot="title" data-slot-type="rich-string" data-slot-required="true">Las personas que <em>responden</em> por su cuenta</h1>
      </div>
      <div class="meta" data-slot="rosterMeta" data-slot-type="string">≈ 2,2 FTE dedicados</div>
    </div>

    <div class="members" data-slot="members" data-slot-type="array" data-slot-required="true">
      <div class="card">
        <div class="photo"><img src="assets/squad/squad-julio.png" alt=""></div>
        <div class="info">
          <div class="role" data-slot-field="role">Responsable de Cuenta</div>
          <div class="name" data-slot-field="name">Julio</div>
          <div class="ded"><span class="pct" data-slot-field="dedication">12%</span><span class="lbl">dedicación</span></div>
        </div>
      </div>
    </div>

    <img class="deck-url-bubble signature-TeamGalleryFull" src="assets/url-lum.svg" alt="efeoncepro.com">
  </div>
</body></html>
