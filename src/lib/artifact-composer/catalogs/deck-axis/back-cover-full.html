<!doctype html>
<html lang="es">
<head>
    <link rel="stylesheet" href="deck-tokens.css">
<link rel="stylesheet" href="deck-signature.css">
  <meta charset="utf-8">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Geist:wght@500;600&display=swap');
    * { margin:0; padding:0; box-sizing:border-box; }
    html, body { width:1920px; height:1080px; }
    body { overflow:hidden; font-family:'Geist',sans-serif; }
    :root { --lum:var(--axis-deck-recipe-backcover-100); --lum-muted:var(--axis-deck-recipe-backcover-300); --deep:var(--axis-deck-navy-880); }
    .slide { position:relative; isolation:isolate; width:1920px; height:1080px; overflow:hidden; background: var(--axis-deck-recipe-back-cover); }
    .slide::after { content:''; position:absolute; inset:0; z-index:-1; opacity:.16; background-image:radial-gradient(rgba(var(--axis-ppt-neutral-50-rgb), .72) .65px, transparent .85px); background-size:4px 4px; }
    .lum { mix-blend-mode:luminosity; }
    .stack { position:absolute; left:0; right:0; bottom:68px; display:flex; flex-direction:column; align-items:center; }
    .brand { width:520px; height:150px; object-fit:contain; }
    .socials { display:flex; align-items:center; gap:16px; margin-top:22px; }
    .social { width:48px; height:48px; display:block; object-fit:contain; mix-blend-mode:luminosity; filter:invert(88%) sepia(27%) saturate(535%) hue-rotate(164deg) brightness(103%) contrast(101%); }
    .contacts { display:flex; align-items:center; justify-content:center; gap:28px; margin-top:28px; color:var(--lum); font-size:22px; font-weight:600; letter-spacing:.012em; line-height:1; white-space:nowrap; }
    .contact { display:flex; align-items:center; gap:9px; mix-blend-mode:luminosity; }
    .contact-icon { width:28px; height:28px; flex:0 0 auto; object-fit:contain; mix-blend-mode:luminosity; filter:invert(88%) sepia(27%) saturate(535%) hue-rotate(164deg) brightness(103%) contrast(101%); }
  </style>
</head>
<body>
  <main class="slide" data-template="BackCoverFull" data-url-bubble-backdrop aria-label="Contraportada Efeonce">
    <div class="stack">
      <img class="brand lum" src="assets/brand/logo-negative.svg" alt="efeonce" data-slot="efeonceLogo">
      <img class="deck-url-bubble deck-url-bubble--inline signature-BackCoverFull" src="assets/url-lum.svg" alt="efeoncepro.com" data-slot="urlBubble">
      <nav class="socials lum" aria-label="Redes sociales de Efeonce" data-slot="socialLinks">
        <img class="social" src="assets/social/spotify.svg" alt="Spotify"><img class="social" src="assets/social/instagram.svg" alt="Instagram"><img class="social" src="assets/social/linkedin.svg" alt="LinkedIn"><img class="social" src="assets/social/threads.svg" alt="Threads"><img class="social" src="assets/social/youtube.svg" alt="YouTube"><img class="social" src="assets/social/tiktok.svg" alt="TikTok">
      </nav>
      <footer class="contacts lum" data-slot="contactDetails">
        <span class="contact email"><img class="contact-icon" src="assets/contact/letter-bold.svg" alt="">sales@efeoncepro.com</span>
        <span class="contact phone"><img class="contact-icon" src="assets/contact/phone-calling-bold.svg" alt="">+56 9 3732 3064</span>
        <span class="contact phone"><img class="contact-icon" src="assets/contact/phone-calling-bold.svg" alt="">+1 (239) 235-2073</span>
        <span class="contact address"><img class="contact-icon" src="assets/contact/map-point-bold.svg" alt="">Dr. Manuel Barros Borgoño 71 OF 1105, Providencia, Chile</span>
      </footer>
    </div>
  </main>
</body>
</html>
