<!doctype html>
<html lang="es">
<head>
    <link rel="stylesheet" href="deck-fonts.css">
  <link rel="stylesheet" href="deck-tokens.css">
  <link rel="stylesheet" href="deck-mold.css">
<link rel="stylesheet" href="deck-signature.css">
  <meta charset="utf-8">
  <style>
    
    * { margin:0; padding:0; box-sizing:border-box; }
    body { overflow:hidden; font-family:var(--axis-deck-type-text); }
    :root { --ink:var(--axis-ppt-indigo-950); --muted:var(--axis-deck-steel-600); --teal:var(--axis-deck-teal-500); --blue:var(--axis-deck-blue-500); --violet:var(--axis-ppt-indigo-600); }
    .slide { background:
      radial-gradient(64% 52% at 96% 100%, rgba(var(--axis-deck-teal-500-rgb), .22) 0%, transparent 46%),
      radial-gradient(130% 100% at 70% -10%, var(--axis-ppt-blue-800) 0%, var(--axis-deck-navy-860) 52%, var(--axis-deck-navy-920) 100%); }
    .wave-frame { position:absolute; inset:56px; border-radius:22px; background:rgba(var(--axis-deck-surface-60-rgb), .82); backdrop-filter:blur(var(--deck-blur-xl)) saturate(1.08); }
    .content { position:relative; z-index:1; width:100%; height:100%; padding:154px 228px 146px; display:flex; flex-direction:column; justify-content:center; }
    .eyebrow { color:var(--blue); font-size:19px; font-weight:600; letter-spacing:.1em; text-transform:uppercase; }
    .statement { margin-top:24px; max-width:1280px; color:var(--ink); font-family:var(--axis-deck-type-display); font-size:76px; font-weight:600; letter-spacing:-.045em; line-height:1.05; }
    .statement-highlight { display:block; margin-top:8px; width:max-content; max-width:100%; color:var(--violet); font-size:88px; font-style:italic; font-weight:800; letter-spacing:-.06em; line-height:1.02; }
    .statement-tail { display:block; margin-top:8px; }
    .statement-tail:empty { display:none; }
    .supporting { margin-top:42px; max-width:690px; color:var(--muted); font-size:29px; font-weight:500; line-height:1.38; }
    .footer-rule { width:96px; height:5px; margin-top:52px; border-radius:99px; background:var(--teal); }
  </style>
</head>
<body>
  <main class="slide" data-template="HighlightWave">
    <div class="wave-frame" aria-hidden="true"></div>
    <section class="content" aria-label="Idea destacada de la propuesta">
      <p class="eyebrow" data-slot="eyebrow" data-slot-type="string">La estrategia</p>
      <h1 class="statement">
        <span data-slot="statementLead" data-slot-type="string" data-slot-required="true">El crecimiento se vuelve sostenible cuando</span>
        <span class="statement-highlight" data-slot="highlight" data-slot-type="string" data-slot-required="true">la evidencia guía cada decisión.</span>
        <span class="statement-tail" data-slot="statementTail" data-slot-type="string"></span>
      </h1>
      <p class="supporting" data-slot="supporting" data-slot-type="rich-string">Una propuesta no solo activa tácticas: crea una forma más clara de priorizar, aprender y demostrar avance.</p>
      <div class="footer-rule" aria-hidden="true"></div>
    </section>
  </main>
</body>
</html>
