<!doctype html>
<html lang="es"><head>  <link rel="stylesheet" href="deck-fonts.css">
  <link rel="stylesheet" href="deck-tokens.css">
  <link rel="stylesheet" href="deck-mold.css">
<meta charset="utf-8"><link rel="stylesheet" href="deck-signature.css">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:var(--axis-deck-type-text); overflow:hidden; }

  :root { --safe-x:132px; --teal:var(--axis-deck-teal-500); --violet:var(--axis-deck-violet-550); --ink:var(--axis-ppt-indigo-950); }

  .slide {
    position:relative; display:flex; flex-direction:column; min-height:100vh; padding:76px var(--safe-x) 76px;
    color:var(--axis-ppt-neutral-50); background:var(--axis-deck-recipe-rich-content);
  }

  .header { display:grid; grid-template-columns:minmax(0, 1fr) 430px; gap:58px; align-items:end; }
  .section-label { margin-bottom:14px; color:var(--teal); font-size:18px; font-weight:700; letter-spacing:0; line-height:1; text-transform:uppercase; }
  .title { max-width:1000px; font-family:var(--axis-deck-type-display); font-size:54px; font-weight:600; letter-spacing:0; line-height:1.05; }
  .title em { color:var(--teal); font-style:italic; }
  .lead { align-self:end; padding:0 0 6px 30px; border-left:1px solid rgba(var(--axis-ppt-neutral-50-rgb), .30); color:rgba(var(--axis-ppt-neutral-50-rgb), .78); font-size:18px; line-height:1.4; }

  /* ===== Dos tarjetas de cita: papel claro sobre navy = testimonio auténtico ===== */
  .quotes { display:grid; grid-template-columns:repeat(2, minmax(0, 1fr)); gap:30px; flex:1 1 auto; margin-top:40px; min-height:0; }
  .quote-card {
    position:relative; min-width:0; display:flex; flex-direction:column; padding:44px 46px 38px;
    border:1px solid rgba(var(--axis-ppt-indigo-950-rgb), .06); border-radius:26px;
    background:var(--axis-ppt-neutral-50);
    box-shadow:0 26px 52px rgba(var(--axis-deck-navy-990-rgb), .30), inset 0 1px 0 rgba(var(--axis-ppt-neutral-50-rgb), .9);
  }
  .quote-card::before {
    content:''; position:absolute; left:46px; right:46px; top:0; height:4px; border-radius:0 0 99px 99px;
    background:var(--teal);
  }
  .qmark { font-family:var(--axis-deck-type-display); font-weight:700; font-size:120px; line-height:.6; height:58px;
    color:color-mix(in srgb, var(--teal) 42%, transparent); user-select:none; }
  .quote-text { margin-top:22px; flex:1 1 auto; color:var(--ink); font-size:23px; font-weight:500; line-height:1.5; letter-spacing:-.004em; }
  .quote-by { margin-top:28px; padding-top:22px; border-top:1px solid rgba(var(--axis-ppt-indigo-950-rgb), .12); display:flex; flex-direction:column; gap:5px; }
  .quote-who { font-family:var(--axis-deck-type-display); font-size:24px; font-weight:650; line-height:1.05; color:var(--ink); }
  .quote-role { display:inline-flex; align-items:center; gap:8px; color:color-mix(in srgb, var(--ink) 62%, transparent); font-size:16px; font-weight:600; letter-spacing:.01em; }
  .quote-role::before { content:''; width:22px; height:2px; border-radius:2px; background:var(--teal); }

  /* ===== Enlace a la muestra viva ===== */
  .proof { margin-top:32px; display:flex; justify-content:center; }
  .proof a {
    display:inline-flex; align-items:center; gap:12px; padding:15px 28px; border-radius:999px;
    border:1px solid rgba(var(--axis-deck-teal-300-rgb), .42);
    background:rgba(var(--axis-deck-teal-400-rgb), .14);
    color:var(--axis-ppt-neutral-50); font-size:18px; font-weight:600; letter-spacing:0; text-decoration:none;
    box-shadow:inset 0 1px 0 rgba(var(--axis-ppt-neutral-50-rgb), .12), 0 16px 30px rgba(var(--axis-deck-navy-990-rgb), .22);
  }
  .proof a strong { color:var(--teal); font-weight:700; }
</style></head>
<body>
  <main class="slide" data-template="TestimonialsFull" data-url-bubble-backdrop>
    <header class="header">
      <div>
        <p class="section-label" data-slot="sectionLabel" data-slot-type="string">La voz de SKY</p>
        <h1 class="title" data-slot="title" data-slot-type="rich-string" data-slot-required="true">Un año trabajando con SKY. <em>Esto dice su equipo.</em></h1>
      </div>
      <p class="lead" data-slot="lead" data-slot-type="string">La relación no empieza con esta licitación: el equipo de SKY ya trabaja con Efeonce.</p>
    </header>

    <section class="quotes" data-slot="testimonials" data-slot-type="array" data-slot-required="true" aria-label="Testimonios del equipo de SKY">
      <article class="quote-card">
        <span class="qmark" aria-hidden="true">&ldquo;</span>
        <p class="quote-text" data-slot-field="quote">Super contenta con el trabajo que hemos realizado este año.</p>
        <div class="quote-by">
          <span class="quote-who" data-slot-field="who">Constanza Rojas</span>
          <span class="quote-role" data-slot-field="role">Team SKY</span>
        </div>
      </article>
    </section>

    <div class="proof" data-slot="proofLink" data-slot-type="rich-string"><a href="https://experiencia.efeoncepro.com">Vea el <strong>primer año completo</strong> con SKY &nbsp;&rarr;</a></div>

    <img class="deck-url-bubble signature-TestimonialsFull" src="assets/url-lum.svg" alt="efeoncepro.com">
  </main>
</body></html>
