<!doctype html>
<html lang="es"><head>  <link rel="stylesheet" href="deck-fonts.css">
  <link rel="stylesheet" href="deck-tokens.css">
  <link rel="stylesheet" href="deck-mold.css">
<meta charset="utf-8"><link rel="stylesheet" href="deck-signature.css">
<style>
  
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:var(--axis-deck-type-text); overflow:hidden; }

  :root {
    --safe:72px;
    /* tokens Think (web-agentica) */
    --navy:var(--axis-deck-navy-860);        /* axis.accent[900] — el midnight navy de Think */
    --navy-2:var(--axis-ppt-blue-800);      /* axis.accent[800] */
    --navy-deep:var(--axis-deck-navy-920);
    --teal:var(--axis-deck-teal-500);        /* teal[500] — teal de firma de Think */
  }

  /* ===== CoverFull: hero de Think — cámara navy, luz de relación y grano editorial ===== */
  .cover {
    position:relative; width:1920px; height:1080px; overflow:hidden;
    display:flex; align-items:center; justify-content:center;
    padding:var(--safe);
    background: var(--axis-deck-recipe-cover-hero);
  }

  /* Lockup centrado: marca Efeonce → marca cliente → tipo de propuesta. El
     cliente entrega una variante on-dark aprobada; el template nunca recolorea. */
  .stack { position:relative; z-index:1; width:1100px; display:flex; flex-direction:column; align-items:center; text-align:center; transform:translateY(-42px); }
  .logo-efeonce { width:840px; max-height:200px; object-fit:contain; }
  .relationship-mark { width:104px; height:1px; margin:24px 0 20px; background:linear-gradient(90deg, transparent, rgba(var(--axis-deck-recipe-cover-halo-teal-rgb), .82), transparent); box-shadow:0 0 20px rgba(var(--axis-deck-teal-500-rgb), .26); }
  .client-stage { min-height:130px; display:flex; align-items:center; justify-content:center; }
  .logo-client  { width:auto; height:122px; max-width:360px; object-fit:contain; }
  .proposal-kind { max-width:840px; margin-top:24px; font-family:var(--axis-deck-type-display); font-weight:600; font-size:70px; color:var(--axis-ppt-neutral-50); line-height:1.06; letter-spacing:-.025em; text-wrap:balance; }

</style></head>
<body>
  <div class="cover" data-template="CoverFull" data-url-bubble-backdrop>
    <div class="stack">
      <img class="logo-efeonce" src="assets/brand/logo-negative.svg" alt="efeonce" data-slot="efeonceLogo">
      <div class="relationship-mark" aria-hidden="true"></div>
      <div class="client-stage">
        <img class="logo-client" src="assets/clients/sky-on-dark.svg" alt="SKY" data-slot="clientLogo" data-slot-type="asset" data-slot-required="true" data-slot-resolver="client-brand-mark">
      </div>
      <div class="proposal-kind" data-slot="proposalKind" data-slot-type="enum" data-slot-required="true" data-slot-resolver="proposal-kind-label">Propuesta Técnica</div>
    </div>
    <img class="deck-url-bubble signature-CoverFull" src="assets/url-lum.svg" alt="efeoncepro.com" data-slot="urlBubble">
  </div>
</body></html>
