<!doctype html>
<html lang="es"><head><meta charset="utf-8"><link rel="stylesheet" href="deck-signature.css">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@600;700&family=Geist:wght@400;500&display=swap');
  * { margin:0; padding:0; box-sizing:border-box; }
  html,body { width:1920px; height:1080px; }
  body { font-family:'Geist',sans-serif; overflow:hidden; }

  :root {
    --safe:72px;
    /* tokens Think (web-agentica) */
    --navy:#00284d;        /* axis.accent[900] — el midnight navy de Think */
    --navy-2:#023c70;      /* axis.accent[800] */
    --navy-deep:#001a33;
    --teal:#36c8bf;        /* teal[500] — teal de firma de Think */
  }

  /* ===== CoverFull: hero de Think — radial navy (luz arriba) + teal como LUZ sutil ===== */
  .cover {
    position:relative; width:1920px; height:1080px; overflow:hidden;
    display:flex; align-items:center; justify-content:center;
    padding:var(--safe);
    background:
      radial-gradient(92% 76% at 50% -8%, rgba(14, 82, 133, .92) 0%, rgba(0, 40, 77, .16) 53%, transparent 72%),
      radial-gradient(58% 44% at 92% 94%, rgba(54, 200, 191, .17) 0%, transparent 52%),
      radial-gradient(135% 100% at 70% -10%, var(--navy-2) 0%, var(--navy) 55%, var(--navy-deep) 100%);
  }

  /* Lockup: marca Efeonce → marca cliente → tipo de propuesta.  El renderer
     solo reemplaza los slots; la jerarquía y las proporciones no se negocian. */
  .stack { position:relative; z-index:1; width:900px; display:flex; flex-direction:column; align-items:center; text-align:center; transform:translateY(-18px); }
  .logo-efeonce { width:650px; max-height:188px; object-fit:contain; }
  .relationship-mark { width:56px; height:1px; margin:24px 0 18px; background:linear-gradient(90deg, transparent, rgba(235, 250, 252, .72), transparent); }
  .client-stage { min-height:104px; display:flex; align-items:center; justify-content:center; }
  .logo-client  { width:500px; max-height:132px; object-fit:contain; filter:brightness(0) invert(1); }
  .proposal-kind { max-width:790px; margin-top:26px; font-family:'Poppins',sans-serif; font-weight:600; font-size:70px; color:#fff; line-height:1.06; letter-spacing:-.025em; text-wrap:balance; }

  /* burbuja URL — footer (técnica #848484 + luminosity, sin transform que aísle) */
  .url { position:absolute; left:0; right:0; bottom:var(--safe); text-align:center; }
  .url img { height:64px; mix-blend-mode:luminosity; }
</style></head>
<body>
  <div class="cover" data-template="CoverFull">
    <div class="stack">
      <img class="logo-efeonce" src="../../../public/branding/logo-negative.svg" alt="efeonce" data-slot="efeonceLogo">
      <div class="relationship-mark" aria-hidden="true"></div>
      <div class="client-stage">
        <img class="logo-client" src="../../assets/public-site/aeo-brand-logos/sky.svg" alt="SKY" data-slot="clientLogo" data-slot-type="asset" data-slot-required="true" data-slot-resolver="client-brand-mark">
      </div>
      <div class="proposal-kind" data-slot="proposalKind" data-slot-type="enum" data-slot-required="true" data-slot-resolver="proposal-kind-label">Propuesta Técnica</div>
    </div>
    <div class="url"><img src="assets/url-lum.svg" alt="efeoncepro.com" data-slot="urlBubble"></div>
  </div>
</body></html>
