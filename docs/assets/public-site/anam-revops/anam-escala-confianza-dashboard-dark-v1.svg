<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="1600" viewBox="0 0 1200 1600" role="img" aria-labelledby="title desc">
  <title id="title">Escala de confianza de un dashboard comercial</title><desc id="desc">Piloto, diagnóstico y KPI oficial se distinguen por la evidencia que permite sostener una decisión.</desc><rect width="1200" height="1600" fill="#111013"/><image href="../../../../public/branding/logo-negative.svg" x="850" y="60" width="270" height="64"/><text x="80" y="188" font-family="Poppins,Arial,sans-serif" font-size="22" font-weight="600" letter-spacing="3" fill="#79B9F0">CASO ANAM · TAXONOMÍA</text><text x="80" y="260" font-family="Poppins,Arial,sans-serif" font-size="48" font-weight="700" fill="#FFF">Un gráfico gradúa</text><text x="80" y="320" font-family="Poppins,Arial,sans-serif" font-size="48" font-weight="700" fill="#FFF">por evidencia</text><text x="80" y="365" font-family="Geist,Arial,sans-serif" font-size="25" fill="#B8C4CF">No por el tiempo que lleva funcionando.</text>
  <g font-family="Poppins,Arial,sans-serif"><g><rect x="80" y="430" width="1040" height="270" rx="28" fill="#1B1D20" stroke="#46515A" stroke-width="2"/><circle cx="150" cy="500" r="28" fill="#7995AA"/><text x="150" y="510" text-anchor="middle" font-size="24" font-weight="700" fill="#FFF">1</text><text x="205" y="510" font-size="34" font-weight="700" fill="#FFF">Piloto</text><text x="120" y="580" font-family="Geist,Arial,sans-serif" font-size="25" fill="#B8C4CF"><tspan x="120">Prueba la configuración y declara supuestos.</tspan><tspan x="120" dy="46">Define su gate de salida.</tspan></text></g><path d="M600 700 V755 L580 735 M600 755 L620 735" stroke="#79B9F0" stroke-width="6" fill="none"/><g><rect x="80" y="770" width="1040" height="290" rx="28" fill="#14283A" stroke="#2C8BD9" stroke-width="3"/><circle cx="150" cy="840" r="28" fill="#0375DB"/><text x="150" y="850" text-anchor="middle" font-size="24" font-weight="700" fill="#FFF">2</text><text x="205" y="850" font-size="34" font-weight="700" fill="#FFF">Diagnóstico</text><text x="120" y="920" font-family="Geist,Arial,sans-serif" font-size="25" fill="#C7D9E7"><tspan x="120">Usa datos reales parciales y declara cobertura.</tspan><tspan x="120" dy="46">Explicita la acción siguiente.</tspan></text></g><path d="M600 1060 V1115 L580 1095 M600 1115 L620 1095" stroke="#79B9F0" stroke-width="6" fill="none"/><g><rect x="80" y="1130" width="1040" height="300" rx="28" fill="#1D2A17" stroke="#6EC207" stroke-width="3"/><circle cx="150" cy="1200" r="28" fill="#6EC207"/><text x="150" y="1210" text-anchor="middle" font-size="24" font-weight="700" fill="#173900">3</text><text x="205" y="1210" font-size="34" font-weight="700" fill="#FFF">KPI oficial</text><text x="120" y="1280" font-family="Geist,Arial,sans-serif" font-size="24" fill="#D3E4C3"><tspan x="120">Definición, período, población y denominador.</tspan><tspan x="120" dy="44">Cobertura, fuente y responsable resueltos.</tspan></text></g></g><text x="600" y="1510" text-anchor="middle" font-family="Poppins,Arial,sans-serif" font-size="26" font-weight="600" fill="#FFF">La evidencia sostiene la decisión.</text>
</svg>
