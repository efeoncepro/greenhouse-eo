name: Ops Worker Deploy

# TASK-409 / hotfix 2026-04-15 — eliminate deployment drift between Vercel
# and Cloud Run ops-worker.
#
# The ops-worker service runs the reactive-consumer runtime (outbox event
# processing, reliquidation delta application, commercial cost attribution
# materialization). It shares the same source tree as the Vercel portal but
# is deployed separately. Historically, pushes to develop/main that touched
# reactive code landed on Vercel immediately but required a manual
# `bash services/ops-worker/deploy.sh` run that could be (and was) skipped.
#
# This workflow watches the subset of source paths that affect ops-worker
# behavior and triggers a staging deploy automatically on every push to
# `develop`. Production deploys are owned by `production-release.yml` via
# workflow_call; workflow_dispatch remains available for audited break-glass.

on:
  push:
    branches:
      - develop
    paths:
      - 'services/ops-worker/**'
      - 'services/_shared/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - '.dockerignore'
      - '.gcloudignore'
      - 'vendor/**'
      - 'tsconfig.json'
      - 'src/lib/sync/**'
      # TASK-1210 — ops-worker hosts /nubox/sync + /nubox/quotes-hot-sync which run
      # upsertIncomeFromSale (income materialization). Sin este filter, cambios al
      # Nubox sync NO triggerean redeploy y el worker queda con código stale (drift
      # live 2026-06-22: el fix del native plane backfill quedó stranded).
      - 'src/lib/nubox/**'
      - 'src/lib/knowledge/**'
      - 'src/lib/payroll/**'
      - 'src/lib/finance/payroll-expense-reactive.ts'
      - 'src/lib/finance/apply-payroll-reliquidation-delta.ts'
      - 'src/lib/email/**'
      - 'src/lib/integrations/**'
      - 'src/lib/globe/**'
      - 'src/lib/google-credentials.ts'
      - 'src/lib/space-notion/**'
      # TASK-742 — ops-worker hosts the auth-providers smoke lane and consumes
      # the readiness/secrets stack, so changes here must trigger a redeploy.
      - 'src/lib/auth/**'
      - 'src/lib/auth-secrets.ts'
      - 'src/lib/secrets/**'
      # ops-worker hosts /reliability-ai-watch which invokes getReliabilityOverview
      # + getReliabilityAiObserver → demo signal readers (TASK-910/913). Sin este
      # filter, fixes a las queries demo (e.g. canonical schema corrections) NO
      # triggerean redeploy y quedan en Sentry generando alertas hasta que otro
      # push toque paths filtrados. Live discovery durante hotfix JAVASCRIPT-NEXTJS-67/68
      # (2026-05-19) — canonical schema fix demo signals quedó stranded post-merge.
      - 'src/lib/reliability/**'
      - 'src/lib/notion-metrics/**'
      # TASK-1234 — ops-worker hosts /growth/grader/drain (drainPendingGraderRuns +
      # recoverStuckRunningRuns). Sin este filter, cambios al run-engine/store del
      # grader NO triggerean redeploy y el worker queda con código stale.
      - 'src/lib/growth/ai-visibility/**'
      # TASK-1298 / release drift 2026-06-30 — ops-worker hosts /growth/forms/dispatch
      # (dispatchPendingSubmissions importa src/lib/growth/forms/*: store/contracts/etc).
      # Sin este filter, cambios al motor de Growth Forms NO redeployan el worker → TASK-1297
      # quedó stranded en ops-worker (3/4 workers al target; ops-worker stale en 21aa7f97).
      - 'src/lib/growth/forms/**'
      # TASK-1391 — el dispatcher del artifact-worker vive en el dominio proposals
      # (render-dispatch/render-jobs); sin este path el ops-worker queda stale en silencio.
      - 'src/lib/commercial/tenders/proposals/**'
      # TASK-1279 — el worker bundlea los reactive consumers del grader (lead-handoff,
      # report-email, operator-send) que importan estos deps transitivos. Sin estos
      # filters + sus entradas en WORKER_RUNTIME_PATHS, un cambio SOLO a estos paths
      # (ej. crm-client del Lead HubSpot) triggerea el workflow pero el drift-check lo
      # salta (git diff --quiet no ve diff en runtime paths) → worker queda stale.
      - 'src/components/growth/ai-visibility/**'
      - 'src/lib/hubspot/**'
      - 'src/emails/**'
      - 'src/lib/observability/**'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        type: choice
        required: true
        default: staging
        options:
          - staging
          - production
      expected_sha:
        description: 'Expected git SHA (default: github.sha). TASK-851 — orchestrator passes target_sha.'
        type: string
        required: false
        default: ''
  # TASK-851 — workflow_call interface for production-release.yml orchestrator.
  # Preserves push and workflow_dispatch entrypoints unchanged.
  workflow_call:
    inputs:
      environment:
        description: 'Target environment (staging | production)'
        type: string
        required: true
      expected_sha:
        description: 'Target git SHA the orchestrator wants deployed'
        type: string
        required: true
    secrets:
      GCP_WORKLOAD_IDENTITY_PROVIDER:
        required: true

# TASK-848 Slice 3 (Opcion A) — concurrency fix canonica para production.
#
# Bug class historico (incidente 2026-04-26 -> 2026-05-09): runs antiguos de
# `main` esperando approval del environment `Production` quedaron `waiting`
# durante 14-22 dias. Pushes nuevos al mismo concurrency group quedaron
# `pending` con `jobs: []` y se cancelaron en cascada.
#
# Fix V1: cancel-in-progress=TRUE para production path. TASK-931 extiende
# latest-only a pushes develop/staging: bajo Vibe Coding, un deploy staging
# superseded por un commit posterior no aporta señal vigente y quema minutos.
#
# Spec: docs/architecture/GREENHOUSE_RELEASE_CONTROL_PLANE_V1.md §2.7
concurrency:
  group: ops-worker-deploy-${{ github.ref }}
  cancel-in-progress: ${{ github.ref == 'refs/heads/develop' || (github.event_name == 'workflow_call' && inputs.environment == 'production') || (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'production') }}

permissions:
  contents: read
  id-token: write # Required for Workload Identity Federation to GCP

jobs:
  deploy:
    name: Deploy ops-worker to Cloud Run
    runs-on: ubuntu-latest
    timeout-minutes: 25

    # Route pushes to staging, production via orchestrator workflow_call,
    # or manual dispatch input for break-glass.
    environment: >-
      ${{
        github.event_name == 'workflow_call'
          && inputs.environment
          || (github.event_name == 'workflow_dispatch'
              && github.event.inputs.environment
              || 'staging')
      }}

    env:
      ENV: >-
        ${{
          github.event_name == 'workflow_call'
            && inputs.environment
            || (github.event_name == 'workflow_dispatch'
                && github.event.inputs.environment
                || 'staging')
        }}
      # TASK-851 — pass EXPECTED_SHA to deploy.sh. Orchestrator (workflow_call)
      # passes its target_sha; workflow_dispatch optionally accepts override;
      # push events fall back to github.sha. A later step resolves manual dispatch
      # without override to the last commit touching the worker runtime surface,
      # so docs-only HEAD commits do not force noisy rebuilds.
      RAW_EXPECTED_SHA: >-
        ${{
          github.event_name == 'workflow_call'
            && inputs.expected_sha
            || (github.event_name == 'workflow_dispatch'
                && github.event.inputs.expected_sha
                || github.sha)
        }}
      GCP_PROJECT_ID: efeonce-group
      GCP_REGION: us-east4
      # Deployer identity: generic github-actions-deployer SA, impersonated
      # via Workload Identity Federation (see scripts/setup-github-actions-wif.sh).
      # This SA has permission to SET greenhouse-portal as the Cloud Run
      # runtime SA (via roles/iam.serviceAccountUser) but is NOT
      # greenhouse-portal itself — deploy identity and runtime identity
      # are kept separate on purpose.
      DEPLOYER_SERVICE_ACCOUNT: github-actions-deployer@efeonce-group.iam.gserviceaccount.com
      RUNTIME_SERVICE_ACCOUNT: greenhouse-portal@efeonce-group.iam.gserviceaccount.com

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Resolve expected worker SHA
        id: resolve-worker-sha
        shell: bash
        env:
          RAW_EXPECTED_SHA: ${{ env.RAW_EXPECTED_SHA }}
        run: |
          set -euo pipefail

          if [ -n "${RAW_EXPECTED_SHA}" ]; then
            RESOLVED_SHA="${RAW_EXPECTED_SHA}"
            RESOLUTION_SOURCE="explicit-input"
          elif [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            RESOLVED_SHA="$(git log -1 --format=%H -- \
              package.json \
              pnpm-lock.yaml \
              tsconfig.json \
              services/ops-worker \
              services/_shared \
              src/lib/sync \
              src/lib/nubox \
              src/lib/knowledge \
              src/lib/payroll \
              src/lib/finance/payroll-expense-reactive.ts \
              src/lib/finance/apply-payroll-reliquidation-delta.ts \
              src/lib/email \
              src/lib/integrations \
              src/lib/globe \
              src/lib/google-credentials.ts \
              src/lib/space-notion \
              src/lib/auth \
              src/lib/auth-secrets.ts \
              src/lib/secrets \
              src/lib/reliability \
              src/lib/notion-metrics \
              src/lib/growth/ai-visibility \
              src/lib/growth/forms \
              src/components/growth/ai-visibility \
              src/lib/hubspot \
              src/emails \
              src/lib/observability)"
            RESOLUTION_SOURCE="latest-worker-runtime-path"
          else
            RESOLVED_SHA="${GITHUB_SHA}"
            RESOLUTION_SOURCE="event-sha"
          fi

          if [ -z "${RESOLVED_SHA}" ]; then
            echo "ERROR: could not resolve expected ops-worker SHA."
            exit 1
          fi

          echo "EXPECTED_SHA=${RESOLVED_SHA}" >> "${GITHUB_ENV}"
          echo "expected_sha=${RESOLVED_SHA}" >> "${GITHUB_OUTPUT}"
          echo "resolution_source=${RESOLUTION_SOURCE}" >> "${GITHUB_OUTPUT}"
          echo "Resolved ops-worker expected SHA: ${RESOLVED_SHA} (${RESOLUTION_SOURCE})"

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.DEPLOYER_SERVICE_ACCOUNT }}

      - name: Set up gcloud CLI
        uses: google-github-actions/setup-gcloud@v3
        with:
          project_id: ${{ env.GCP_PROJECT_ID }}

      - name: Verify gcloud account
        run: |
          gcloud config list --format='value(core.project,core.account)'
          gcloud auth list

      - name: Check deployed revision drift
        id: worker-drift
        shell: bash
        run: |
          set -euo pipefail
          WORKER_RUNTIME_PATHS=(
            package.json
            pnpm-lock.yaml
            tsconfig.json
            services/ops-worker
            services/_shared
            src/lib/sync
            src/lib/nubox
            src/lib/knowledge
            src/lib/payroll
            src/lib/finance/payroll-expense-reactive.ts
            src/lib/finance/apply-payroll-reliquidation-delta.ts
            src/lib/email
            src/lib/integrations
            src/lib/space-notion
            src/lib/auth
            src/lib/auth-secrets.ts
            src/lib/secrets
            src/lib/reliability
            src/lib/notion-metrics
            src/lib/growth/ai-visibility
            src/lib/growth/forms
            src/components/growth/ai-visibility
            src/lib/hubspot
            src/emails
            src/lib/observability
          )

          CURRENT_REVISION="$(gcloud run services describe ops-worker \
            --project="${GCP_PROJECT_ID}" \
            --region="${GCP_REGION}" \
            --format='value(status.latestReadyRevisionName)' 2>/dev/null || true)"

          CURRENT_GIT_SHA=""
          if [ -n "${CURRENT_REVISION}" ]; then
            CURRENT_GIT_SHA="$(gcloud run revisions describe "${CURRENT_REVISION}" \
              --project="${GCP_PROJECT_ID}" \
              --region="${GCP_REGION}" \
              --format=json | python3 -c 'import json, sys; data = json.load(sys.stdin); print(next((env.get("value", "") for c in (data.get("spec", {}).get("containers", []) or []) for env in (c.get("env") or []) if env.get("name") == "GIT_SHA"), ""))' 2>/dev/null || true)"
          fi

          if [ "${CURRENT_GIT_SHA}" = "${EXPECTED_SHA}" ]; then
            DEPLOY_NEEDED="false"
            echo "ops-worker already serves EXPECTED_SHA=${EXPECTED_SHA} at revision ${CURRENT_REVISION}; skipping build/deploy."
          elif [ -n "${CURRENT_GIT_SHA}" ] \
            && git cat-file -e "${CURRENT_GIT_SHA}^{commit}" 2>/dev/null \
            && git diff --quiet "${EXPECTED_SHA}..${CURRENT_GIT_SHA}" -- "${WORKER_RUNTIME_PATHS[@]}"; then
            DEPLOY_NEEDED="false"
            echo "ops-worker serves ${CURRENT_GIT_SHA}; worker runtime paths are unchanged since EXPECTED_SHA=${EXPECTED_SHA}; skipping build/deploy."
          else
            DEPLOY_NEEDED="true"
            echo "ops-worker deploy required: current_revision=${CURRENT_REVISION:-none}, current_git_sha=${CURRENT_GIT_SHA:-none}, expected_sha=${EXPECTED_SHA}"
          fi

          echo "deploy_needed=${DEPLOY_NEEDED}" >> "${GITHUB_OUTPUT}"
          echo "current_revision=${CURRENT_REVISION}" >> "${GITHUB_OUTPUT}"
          echo "current_git_sha=${CURRENT_GIT_SHA}" >> "${GITHUB_OUTPUT}"

      - name: Deploy ops-worker
        if: steps.worker-drift.outputs.deploy_needed == 'true'
        run: |
          bash services/ops-worker/deploy.sh
        env:
          ENV: ${{ env.ENV }}
          EXPECTED_SHA: ${{ steps.resolve-worker-sha.outputs.expected_sha }}
          # TASK-1265 — DataForSEO login para el provider google_ai_overview. El password se
          # resuelve via secret ref en el worker; el login se inyecta acá como GH secret
          # (enmascarado en logs) y viaja como env plano al worker (el adapter lo lee directo).
          DATAFORSEO_API_LOGIN: ${{ secrets.DATAFORSEO_API_LOGIN }}

      - name: Verify deployment health
        run: |
          # Confirm the latest revision is serving. Cloud Run only routes
          # traffic to healthy revisions, so a successful deploy already
          # implies the container passed its startup probe. This step adds
          # an explicit revision-status check for visibility in the log.
          REVISION="$(gcloud run services describe ops-worker \
            --project=${GCP_PROJECT_ID} \
            --region=${GCP_REGION} \
            --format='value(status.latestReadyRevisionName)')"
          READY="$(gcloud run services describe ops-worker \
            --project=${GCP_PROJECT_ID} \
            --region=${GCP_REGION} \
            --format='value(status.conditions[0].status)')"
          echo "Latest ready revision: ${REVISION}"
          echo "Service ready: ${READY}"
          if [ "${READY}" != "True" ]; then
            echo "::warning::Service reports not-ready. Check Cloud Run logs."
          fi
          echo "✓ ops-worker deploy verified (revision ${REVISION})"

      # TASK-851 — explicit poll Ready=True with bounded timeout (300s).
      # deploy.sh already verifies GIT_SHA matches EXPECTED_SHA, but this
      # workflow-level step gives the orchestrator (production-release.yml)
      # a single named step it can wait on for `success()` outcome.
      - name: Poll Ready=True bounded
        run: |
          DEADLINE=$((SECONDS + 300))
          while [ ${SECONDS} -lt ${DEADLINE} ]; do
            READY="$(gcloud run services describe ops-worker \
              --project=${GCP_PROJECT_ID} \
              --region=${GCP_REGION} \
              --format='value(status.conditions[0].status)')"
            if [ "${READY}" = "True" ]; then
              echo "✓ Service Ready=True at $((SECONDS))s"
              exit 0
            fi
            echo "  waiting Ready=True (current=${READY}, elapsed=${SECONDS}s)"
            sleep 10
          done
          echo "ERROR: Service did not reach Ready=True within 300s"
          exit 1

      - name: Record deployment commit
        run: |
          echo "Deployed commit: ${{ steps.resolve-worker-sha.outputs.expected_sha }}" >> "$GITHUB_STEP_SUMMARY"
          echo "Environment: ${{ env.ENV }}" >> "$GITHUB_STEP_SUMMARY"
          echo "Triggered by: ${{ github.event_name }}" >> "$GITHUB_STEP_SUMMARY"
          echo "SHA resolution: ${{ steps.resolve-worker-sha.outputs.resolution_source }}" >> "$GITHUB_STEP_SUMMARY"
          echo "Deploy needed: ${{ steps.worker-drift.outputs.deploy_needed }}" >> "$GITHUB_STEP_SUMMARY"
