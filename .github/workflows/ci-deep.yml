name: CI Deep Verification

on:
  workflow_dispatch:
  schedule:
    # Weekly backstop outside the human iteration loop.
    - cron: '17 8 * * 1'
  push:
    branches:
      - main
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - '.claude/**'
      - '.codex/**'
      - '.agents/**'

concurrency:
  group: ci-deep-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' }}

permissions:
  contents: read

jobs:
  coverage:
    name: Coverage and deep test observability
    runs-on: ubuntu-latest
    # 2026-07-18: subido de 20 junto con el timeout del step Coverage (10→17);
    # setup (checkout+install+playwright) toma ~3 min — 20 quedaba sin holgura.
    timeout-minutes: 25
    env:
      CI: true
      NEXT_TELEMETRY_DISABLED: 1
      NEXTAUTH_SECRET: ci-placeholder-secret
      NEXTAUTH_URL: http://localhost:3000
      GCP_PROJECT: ci-placeholder-project
      GOOGLE_CLOUD_LOCATION: us-central1
      GOOGLE_GENAI_USE_VERTEXAI: 'false'
      GOOGLE_APPLICATION_CREDENTIALS_JSON: '{}'
      GOOGLE_APPLICATION_CREDENTIALS_JSON_BASE64: e30=
      GOOGLE_CLIENT_ID: ci-google-client-id
      GOOGLE_CLIENT_SECRET: ci-google-client-secret
      AZURE_AD_CLIENT_ID: ci-azure-client-id
      AZURE_AD_CLIENT_SECRET: ci-azure-client-secret
      GREENHOUSE_AGENT_MODEL: gpt-5-mini
      HUBSPOT_GREENHOUSE_INTEGRATION_BASE_URL: https://example.invalid
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Deep coverage executes the artifact-composer suites too. Those tests
      # launch Playwright's pinned Chromium headless shell, so this workflow
      # must provision the same browser cache as the main CI gate.
      - name: Resolve Playwright version
        id: playwright-version
        run: echo "version=$(node -p "require('@playwright/test/package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright chromium headless shell
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-shell-${{ runner.os }}-${{ steps.playwright-version.outputs.version }}

      - name: Provision Playwright chromium headless shell
        run: pnpm exec playwright install chromium --only-shell

      - name: Coverage
        run: pnpm test:coverage
        # Instrumented full suite (~9.8k tests, 2026-07-18) exceeds 10 minutes on
        # the 2-core runner: the old timeout killed a healthy run at exactly
        # start+10:00 (release 9f00a1715) leaving the summary as n/a. Headroom
        # bounded by the job-level 20-minute limit.
        timeout-minutes: 17

      - name: Test observability summary
        if: always()
        run: pnpm test:observability:summary

      - name: Publish deep summary
        if: always()
        run: |
          if [ -f artifacts/tests/summary.md ]; then
            cat artifacts/tests/summary.md >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload deep test observability artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: deep-test-observability
          if-no-files-found: warn
          path: |
            artifacts/tests/**
            artifacts/coverage/**
