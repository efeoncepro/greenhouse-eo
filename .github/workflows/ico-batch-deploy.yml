name: ICO Batch Worker Deploy

# TASK-245 follow-up — eliminate deployment drift between Vercel and the
# ico-batch-worker Cloud Run service (same pattern as ops-worker-deploy.yml
# introduced by TASK-409).
#
# ico-batch-worker runs the ICO Engine materialization pipeline and, after
# TASK-245, the Finance Signal Engine pipeline. It shares the monorepo
# source tree with Vercel but is deployed separately. Without a workflow,
# pushes that touch either pipeline land on Vercel immediately while
# Cloud Run requires a manual `bash services/ico-batch/deploy.sh` run.
#
# This workflow watches the paths that affect ico-batch-worker behavior
# and deploys automatically on every push to `develop`. Production deploys
# on `main` are gated behind an environment with required reviewers.

on:
  push:
    branches:
      - develop
      - main
    paths:
      - 'services/ico-batch/**'
      - 'src/lib/ico-engine/**'
      - 'src/lib/finance/ai/**'
      - 'src/lib/ai/**'
      - 'src/lib/sync/event-catalog.ts'
      - 'src/lib/sync/publish-event.ts'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        type: choice
        required: true
        default: staging
        options:
          - staging
          - production
      expected_sha:
        description: 'Expected git SHA (default: github.sha). TASK-851 — orchestrator passes target_sha.'
        type: string
        required: false
        default: ''
  # TASK-851 — workflow_call interface for production-release.yml orchestrator.
  workflow_call:
    inputs:
      environment:
        description: 'Target environment (staging | production)'
        type: string
        required: true
      expected_sha:
        description: 'Target git SHA the orchestrator wants deployed'
        type: string
        required: true
    secrets:
      GCP_WORKLOAD_IDENTITY_PROVIDER:
        required: true

# TASK-848 Slice 3 (Opcion A) — concurrency fix canonica para production.
# Ver ops-worker-deploy.yml para contexto. Spec:
# docs/architecture/GREENHOUSE_RELEASE_CONTROL_PLANE_V1.md §2.7
concurrency:
  group: ico-batch-deploy-${{ github.ref }}
  cancel-in-progress: ${{ (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'production') || github.ref == 'refs/heads/main' }}

permissions:
  contents: read
  id-token: write # Required for Workload Identity Federation to GCP

jobs:
  deploy:
    name: Deploy ico-batch-worker to Cloud Run
    runs-on: ubuntu-latest
    timeout-minutes: 25

    # Route pushes by branch, fall back to manual dispatch input.
    environment: >-
      ${{
        github.event_name == 'workflow_call'
          && inputs.environment
          || (github.event_name == 'workflow_dispatch'
              && github.event.inputs.environment
              || (github.ref == 'refs/heads/main' && 'production' || 'staging'))
      }}

    env:
      ENV: >-
        ${{
          github.event_name == 'workflow_call'
            && inputs.environment
            || (github.event_name == 'workflow_dispatch'
                && github.event.inputs.environment
                || (github.ref == 'refs/heads/main' && 'production' || 'staging'))
        }}
      EXPECTED_SHA: >-
        ${{
          github.event_name == 'workflow_call'
            && inputs.expected_sha
            || (github.event_name == 'workflow_dispatch'
                && github.event.inputs.expected_sha
                || github.sha)
        }}
      GCP_PROJECT_ID: efeonce-group
      GCP_REGION: us-east4
      # Deployer identity: generic github-actions-deployer SA, impersonated
      # via Workload Identity Federation. Same pattern as ops-worker.
      DEPLOYER_SERVICE_ACCOUNT: github-actions-deployer@efeonce-group.iam.gserviceaccount.com
      RUNTIME_SERVICE_ACCOUNT: greenhouse-portal@efeonce-group.iam.gserviceaccount.com

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.DEPLOYER_SERVICE_ACCOUNT }}

      - name: Set up gcloud CLI
        uses: google-github-actions/setup-gcloud@v3
        with:
          project_id: ${{ env.GCP_PROJECT_ID }}

      - name: Verify gcloud account
        run: |
          gcloud config list --format='value(core.project,core.account)'
          gcloud auth list

      - name: Deploy ico-batch-worker
        run: |
          bash services/ico-batch/deploy.sh
        env:
          ENV: ${{ env.ENV }}
          EXPECTED_SHA: ${{ env.EXPECTED_SHA }}

      - name: Verify deployment health
        run: |
          REVISION="$(gcloud run services describe ico-batch-worker \
            --project=${GCP_PROJECT_ID} \
            --region=${GCP_REGION} \
            --format='value(status.latestReadyRevisionName)')"
          READY="$(gcloud run services describe ico-batch-worker \
            --project=${GCP_PROJECT_ID} \
            --region=${GCP_REGION} \
            --format='value(status.conditions[0].status)')"
          echo "Latest ready revision: ${REVISION}"
          echo "Service ready: ${READY}"
          if [ "${READY}" != "True" ]; then
            echo "::warning::Service reports not-ready. Check Cloud Run logs."
          fi
          echo "✓ ico-batch-worker deploy verified (revision ${REVISION})"

      # TASK-851 — bounded Ready=True poll for orchestrator gate.
      - name: Poll Ready=True bounded
        run: |
          DEADLINE=$((SECONDS + 300))
          while [ ${SECONDS} -lt ${DEADLINE} ]; do
            READY="$(gcloud run services describe ico-batch-worker \
              --project=${GCP_PROJECT_ID} \
              --region=${GCP_REGION} \
              --format='value(status.conditions[0].status)')"
            if [ "${READY}" = "True" ]; then
              echo "✓ Service Ready=True at $((SECONDS))s"
              exit 0
            fi
            sleep 10
          done
          echo "ERROR: Service did not reach Ready=True within 300s"
          exit 1

      - name: Record deployment commit
        run: |
          echo "Deployed commit: ${{ env.EXPECTED_SHA }}" >> "$GITHUB_STEP_SUMMARY"
          echo "Environment: ${{ env.ENV }}" >> "$GITHUB_STEP_SUMMARY"
          echo "Triggered by: ${{ github.event_name }}" >> "$GITHUB_STEP_SUMMARY"
