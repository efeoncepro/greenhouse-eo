name: Production Release Watchdog

# TASK-849 — Watchdog que detecta approvals obsoletos de Production, runs
# productivos sin jobs y drift de deploy de workers.
#
# Mitigacion temporal 2026-05-24: manual-only hasta TASK-920. La señal
# scheduled tuvo 72 fallos en los ultimos 100 runs y generaba ruido falso.
# Mantener workflow_dispatch permite verificación ad-hoc post-release sin
# quemar runs scheduled ni alertar con evidencia no confiable.
#
# **Hosting decision original** (TASK-849 §Slice 2): GitHub Actions schedule, NO
# Vercel cron, NO Cloud Scheduler. Estado vigente: schedule pausado hasta
# TASK-920. Razon original:
# - Detector consume primariamente GitHub API → execute dentro de GH Actions
#   evita roundtrips cross-cloud y usa GITHUB_TOKEN auto-provisto.
# - Tooling/monitoring read-only, NOT async-critical (clasificacion `tooling`
#   per `GREENHOUSE_VERCEL_CRON_CLASSIFICATION_V1.md`).
#
# **Residual risk conocido**: el watchdog scheduled puede fallar loud por
# drift/semántica stale y contaminar CI/release con falsos positivos. TASK-920
# debe hacerlo resiliente antes de reactivar el schedule.

on:
  workflow_dispatch:
    inputs:
      enable_teams:
        description: 'Enviar alerts Teams (default false en dispatch manual para testing)'
        type: boolean
        default: false
      fail_on_error:
        description: 'Exit 1 si severity in {error, critical} (default true scheduled)'
        type: boolean
        default: true

# Concurrency: cancel-in-progress=true. Si llega run nuevo, cancela el
# anterior — la ultima foto siempre tiene el state mas fresh de GitHub +
# Cloud Run. NO genera deadlock como los workers (que sufrian
# cancel-in-progress=false antes de TASK-848).
concurrency:
  group: production-release-watchdog
  cancel-in-progress: true

permissions:
  contents: read       # checkout
  actions: read        # query workflow runs + jobs + pending_deployments
  id-token: write      # WIF para gcloud (Cloud Run revisions describe)

jobs:
  watchdog:
    name: Run watchdog detector
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      # Patron canonico: pnpm SETUP primero, Node DESPUES con cache:pnpm.
      # Mismo orden que production-release.yml + ci.yml + design-contract.yml.
      # Order inverso (Node antes que pnpm) hace que setup-node@v5 falle con
      # "Unable to locate executable file: pnpm" (detectado live 2026-05-10
      # runs 25632589166 / 25634395735 / 25635607342 — 3 fallos consecutivos
      # del watchdog scheduled antes de detectar el mis-ordering).
      - name: Setup pnpm
        # No `version:` here — heredamos del `packageManager` field en
        # package.json (Corepack canonical source of truth).
        uses: pnpm/action-setup@v6

      - name: Setup Node 24
        uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Authenticate to Google Cloud (for Cloud Run revisions)
        id: auth
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: github-actions-deployer@efeonce-group.iam.gserviceaccount.com

      - name: Setup gcloud CLI
        uses: google-github-actions/setup-gcloud@v3
        with:
          project_id: efeonce-group

      - name: Run watchdog
        id: watchdog
        env:
          # GITHUB_TOKEN auto-provisto por GH Actions runner; el reader lo lee
          # via resolveGithubToken().
          GITHUB_TOKEN: ${{ github.token }}
          # TASK-849 follow-up 2026-05-10 — el reader worker_revision_drift
          # debe leer `greenhouse_sync.release_manifests` como SSoT tambien
          # dentro de GitHub Actions. Sin estas env vars cae al fallback GitHub
          # API y puede comparar contra workflows directos antiguos en vez del
          # ultimo manifest released/degraded canonico.
          GREENHOUSE_POSTGRES_INSTANCE_CONNECTION_NAME: efeonce-group:us-east4:greenhouse-pg-dev
          GREENHOUSE_POSTGRES_DATABASE: greenhouse_app
          GREENHOUSE_POSTGRES_USER: greenhouse_ops
          GREENHOUSE_POSTGRES_PASSWORD_SECRET_REF: greenhouse-pg-dev-ops-password
          GCP_PROJECT: efeonce-group
          # Activacion de Teams dispatch:
          # - schedule: ENABLE_TEAMS_DISPATCH=true (alertas reales en cada cron run)
          # - workflow_dispatch manual: solo si input enable_teams=true (testing)
          ENABLE_TEAMS_DISPATCH: >-
            ${{
              github.event_name == 'schedule' && 'true'
              || (github.event.inputs.enable_teams == 'true' && 'true' || 'false')
            }}
        run: |
          set +e
          pnpm tsx --require ./scripts/lib/server-only-shim.cjs \
            scripts/release/production-release-watchdog.ts \
            --json \
            $([ "${{ inputs.fail_on_error }}" != "false" ] && echo "--fail-on-error") \
            > watchdog-output.json
          WATCHDOG_EXIT=$?
          set -e

          echo "exit_code=${WATCHDOG_EXIT}" >> "$GITHUB_OUTPUT"

          # Pretty-print JSON to job summary for operator visibility.
          {
            echo "## Production Release Watchdog Summary"
            echo ""
            echo "- Run: ${{ github.run_id }}"
            echo "- Trigger: ${{ github.event_name }}"
            echo "- Exit code: ${WATCHDOG_EXIT}"
            echo ""
            echo "### Findings"
            echo ""
            echo '```json'
            cat watchdog-output.json
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

          # Re-emit findings to logs for human review.
          cat watchdog-output.json

          # Forward exit code to overall job status.
          exit ${WATCHDOG_EXIT}

      - name: Upload watchdog report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: watchdog-report-${{ github.run_id }}
          path: watchdog-output.json
          retention-days: 30
