name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - develop

permissions:
  contents: read

jobs:
  quality:
    name: Lint, test and build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      CI: true
      NEXT_TELEMETRY_DISABLED: 1
      NEXTAUTH_SECRET: ci-placeholder-secret
      NEXTAUTH_URL: http://localhost:3000
      GCP_PROJECT: ci-placeholder-project
      GOOGLE_CLOUD_LOCATION: us-central1
      GOOGLE_GENAI_USE_VERTEXAI: 'false'
      GOOGLE_APPLICATION_CREDENTIALS_JSON: '{}'
      GOOGLE_APPLICATION_CREDENTIALS_JSON_BASE64: e30=
      GOOGLE_CLIENT_ID: ci-google-client-id
      GOOGLE_CLIENT_SECRET: ci-google-client-secret
      AZURE_AD_CLIENT_ID: ci-azure-client-id
      AZURE_AD_CLIENT_SECRET: ci-azure-client-secret
      GREENHOUSE_AGENT_MODEL: gpt-5-mini
      HUBSPOT_GREENHOUSE_INTEGRATION_BASE_URL: https://example.invalid
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check migrations
        run: |
          echo "=== Migration files ==="
          ls -la migrations/ 2>/dev/null || echo "No migrations directory"
          echo ""
          echo "=== Validating SQL syntax (basic) ==="
          for f in migrations/*.sql; do
            [ -f "$f" ] || continue
            if head -1 "$f" | grep -qiE "^(--|SELECT|SET|CREATE|ALTER|DROP|INSERT|UPDATE|DELETE|DO|BEGIN)"; then
              echo "  ✓ $f"
            else
              echo "  ✗ $f — unexpected first line: $(head -1 "$f")"
              exit 1
            fi
          done
          echo ""
          echo "=== Migration count: $(ls migrations/*.sql 2>/dev/null | wc -l | tr -d ' ') ==="

      - name: Lint
        run: pnpm lint

      - name: Vercel cron async-critical gate (TASK-775)
        # Bloquea PRs que agreguen entries `async-critical` a vercel.json sin
        # equivalente Cloud Scheduler. Vercel custom environments NO ejecutan
        # crons en staging — el bug class que cierra es: cron crítico añadido a
        # Vercel pero invisible en staging, side effect calla.
        # Run en modo `--warn` durante migración TASK-775 (Slices 2/3/7 lo bajan
        # a 0); promueve a strict (sin --warn) después de cierre.
        run: pnpm vercel-cron-gate --warn

      - name: Migration marker gate (TASK-838 / ISSUE-068)
        # Bloquea PRs con migrations que tengan el patrón "Up Migration vacía +
        # DDL bajo Down Migration" — la clase de bug que causó ISSUE-068
        # (TASK-404 governance tables nunca creadas en PG). Modo strict.
        run: pnpm migration-marker-gate

      - name: Migration marker gate self-tests
        # Verifica que el parser del gate sigue funcionando (7 cases).
        run: pnpm migration-marker-gate:test

      - name: Test inventory
        run: pnpm test:inventory

      - name: Test
        run: pnpm test:results
        timeout-minutes: 5

      - name: Coverage
        run: pnpm test:coverage
        timeout-minutes: 8

      - name: Test observability summary
        if: always()
        run: pnpm test:observability:summary

      - name: Publish test summary
        if: always()
        run: |
          if [ -f artifacts/tests/summary.md ]; then
            cat artifacts/tests/summary.md >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload test observability artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-observability
          if-no-files-found: warn
          path: |
            artifacts/tests/**
            artifacts/coverage/**

      - name: Build
        run: pnpm build
