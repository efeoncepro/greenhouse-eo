name: CI

on:
  workflow_dispatch:
  pull_request:
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - '.claude/**'
      - '.codex/**'
      - '.agents/**'
  push:
    branches:
      - main
      - develop
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - '.claude/**'
      - '.codex/**'
      - '.agents/**'

concurrency:
  # Vibe-coding produces many superseded commits in minutes. Keep the latest
  # signal for PR/develop, but never cancel a main verification run.
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' || github.ref == 'refs/heads/develop' }}

permissions:
  contents: read

jobs:
  quality:
    name: Fast feedback and conditional build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      CI: true
      NEXT_TELEMETRY_DISABLED: 1
      NEXTAUTH_SECRET: ci-placeholder-secret
      NEXTAUTH_URL: http://localhost:3000
      GCP_PROJECT: ci-placeholder-project
      GOOGLE_CLOUD_LOCATION: us-central1
      GOOGLE_GENAI_USE_VERTEXAI: 'false'
      GOOGLE_APPLICATION_CREDENTIALS_JSON: '{}'
      GOOGLE_APPLICATION_CREDENTIALS_JSON_BASE64: e30=
      GOOGLE_CLIENT_ID: ci-google-client-id
      GOOGLE_CLIENT_SECRET: ci-google-client-secret
      AZURE_AD_CLIENT_ID: ci-azure-client-id
      AZURE_AD_CLIENT_SECRET: ci-azure-client-secret
      GREENHOUSE_AGENT_MODEL: gpt-5-mini
      HUBSPOT_GREENHOUSE_INTEGRATION_BASE_URL: https://example.invalid
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm

      - name: Restore ESLint cache
        uses: actions/cache@v5
        with:
          path: .eslintcache
          key: eslint-${{ runner.os }}-${{ hashFiles('eslint.config.mjs', 'package.json', 'pnpm-lock.yaml', 'tsconfig.json') }}
          restore-keys: |
            eslint-${{ runner.os }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check migrations
        run: |
          echo "=== Migration files ==="
          ls -la migrations/ 2>/dev/null || echo "No migrations directory"
          echo ""
          echo "=== Validating SQL syntax (basic) ==="
          for f in migrations/*.sql; do
            [ -f "$f" ] || continue
            if head -1 "$f" | grep -qiE "^(--|SELECT|SET|CREATE|ALTER|DROP|INSERT|UPDATE|DELETE|DO|BEGIN)"; then
              echo "  ✓ $f"
            else
              echo "  ✗ $f — unexpected first line: $(head -1 "$f")"
              exit 1
            fi
          done
          echo ""
          echo "=== Migration count: $(ls migrations/*.sql 2>/dev/null | wc -l | tr -d ' ') ==="

      - name: Build icons for lint
        run: pnpm build:icons

      - name: Lint
        run: pnpm exec eslint . --cache --cache-location .eslintcache

      - name: Lint-rule tests (TASK-1038)
        # Los custom rules de eslint-plugins/greenhouse/ tienen tests RuleTester
        # (.test.mjs) que el `include` de vitest NO cubre (vitest solo escanea
        # src/scripts/services). Antes no corrían en NINGÚN runner — un test podía
        # romperse silenciosamente (caso real: no-cross-domain usaba `import type`
        # sin parser TS y fallaba sin que nadie lo viera). `node --test` con glob
        # los auto-descubre, así que rules nuevos quedan protegidos sin tocar config.
        run: pnpm test:lint-rules

      - name: Typecheck
        run: pnpm typecheck

      - name: Vercel cron async-critical gate (TASK-775)
        # Bloquea PRs que agreguen entries `async-critical` a vercel.json sin
        # equivalente Cloud Scheduler. Vercel custom environments NO ejecutan
        # crons en staging — el bug class que cierra es: cron crítico añadido a
        # Vercel pero invisible en staging, side effect calla.
        # Run en modo `--warn` durante migración TASK-775 (Slices 2/3/7 lo bajan
        # a 0); promueve a strict (sin --warn) después de cierre.
        run: pnpm vercel-cron-gate --warn

      - name: Route reachability gate (TASK-982/983)
        # Detecta rutas (dashboard) huérfanas: páginas reales que NADA en src/
        # navega (ni VerticalMenu/href, ni routes-array registry, ni template href,
        # ni child declarado en el manifest, ni dinámica [id]). Espejo navegacional
        # de la governance de view-registry (TASK-827). **STRICT desde TASK-983**:
        # el backlog legacy de 19 huérfanos fue triado a 0; ahora cualquier huérfano
        # nuevo BLOQUEA el build.
        run: pnpm route-reachability-gate --strict

      - name: Nexa Intelligence doc gate (TASK-1124)
        # Si cambia código de un dominio Nexa (system prompt, voz, behavior/routing,
        # tool/knowledge, evidencia, flags, modelos LLM) pero NO se actualizó ninguno
        # de sus docs de capa en docs/architecture/nexa-intelligence/, falla. También
        # falla si un archivo Nexa nuevo no está registrado en el manifest (dominio sin
        # capa). SSOT: docs/architecture/nexa-intelligence/manifest.json.
        run: pnpm nexa:doc-gate --changed --base=origin/${{ github.base_ref || 'develop' }}

      - name: Migration marker gate (TASK-838 / ISSUE-068)
        # Bloquea PRs con migrations que tengan el patrón "Up Migration vacía +
        # DDL bajo Down Migration" — la clase de bug que causó ISSUE-068
        # (TASK-404 governance tables nunca creadas en PG). Modo strict.
        run: pnpm migration-marker-gate

      - name: Migration marker gate self-tests
        # Verifica que el parser del gate sigue funcionando (7 cases).
        run: pnpm migration-marker-gate:test

      - name: Worker runtime-deps gate (ISSUE-090)
        # Bloquea el silent-startup-crash de los workers Cloud Run Node: un módulo
        # worker-bundled de src/lib/** que importa un paquete npm clasificado como
        # devDependency. El runtime stage hace `pnpm install --prod` (solo deps) →
        # el paquete externalizado no existe → ERR_MODULE_NOT_FOUND al arrancar →
        # no escucha en 8080 → deploy failed. Convierte ese crash en CI-fail.
        run: pnpm worker:runtime-deps-gate

      - name: Worker build-input contract gate
        # Verifica package-manager SoT, tarballs file:+integrity, orden COPY→install,
        # contextos Cloud Build/Docker y path triggers de los cuatro workers.
        run: pnpm worker:build-contract-gate && pnpm worker:build-contract-gate:test

      # NOTA (TASK-1160): los gates de CLAUDE.md (budget + rule-audit) viven en su
      # workflow dedicado `claude-md-governance.yml`, porque ESTE workflow ignora
      # `**/*.md` y `docs/**` en sus triggers — un PR que solo edita CLAUDE.md NO
      # dispararía este job, que es justo el vector de re-acreción que el gate debe
      # cazar. El workflow dedicado dispara en CLAUDE.md + docs/architecture/** + los
      # scripts del gate.

      - name: Test inventory
        run: pnpm test:inventory

      # Los tests del artifact-composer (composability/geometría/fit) lanzan el
      # Chromium headless shell PINNEADO de Playwright (determinismo del render:
      # el system Chrome del runner cambia de versión y mediría otro layout).
      # Sin este paso fallan 4 suites con "Executable doesn't exist" — rojo que
      # existía desde que el deck composer entró al repo (runs 29192166841+).
      # Cache por versión de @playwright/test: hit = segundos, miss = ~30s.
      - name: Resolve Playwright version
        id: playwright-version
        run: echo "version=$(node -p "require('@playwright/test/package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright chromium headless shell
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-shell-${{ runner.os }}-${{ steps.playwright-version.outputs.version }}

      - name: Provision Playwright chromium headless shell
        run: pnpm exec playwright install chromium --only-shell

      - name: Test
        run: pnpm test:results
        # The full unit suite keeps growing (~9.8k tests as of 2026-07-18) and a
        # green run on the 2-core runner now takes ~7-8 minutes: the previous
        # timeout of 8 killed two healthy runs mid-suite with no vitest summary
        # (release 9f00a1715 — both deaths at exactly start+8:00). Keep it
        # bounded but with real headroom; a hung run still dies well before the
        # job-level limit.
        timeout-minutes: 14

      - name: Test observability summary
        if: always()
        run: pnpm test:observability:summary

      - name: Publish test summary
        if: always()
        run: |
          if [ -f artifacts/tests/summary.md ]; then
            cat artifacts/tests/summary.md >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload test observability artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-observability
          if-no-files-found: warn
          path: |
            artifacts/tests/**

      - name: Build
        # Vercel already builds every develop push. Keep GitHub build as a PR,
        # main and manual checkpoint gate to avoid paying for duplicate develop
        # builds while preserving pre-release evidence.
        if: ${{ github.event_name == 'pull_request' || github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch' }}
        env:
          NODE_OPTIONS: --max-old-space-size=6144
        run: pnpm build
