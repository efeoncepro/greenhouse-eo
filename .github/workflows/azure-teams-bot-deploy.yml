name: Azure Teams Bot Deploy

# TASK-671 — Provision Azure Bot Service for the Greenhouse Teams bot.
# TASK-853 — workflow_call interface canonico para production-release.yml
# orquestador (TASK-851). Bicep deploy gated por diff paths o force flag.
#
# Sibling workflow to azure-teams-deploy.yml (Logic Apps). Reuses the same
# Workload Identity Federation setup against the efeoncepro Azure AD tenant.
#
# Required GitHub repo secrets (already configured for TASK-669):
#   AZURE_CLIENT_ID         — App registration client id (federated to GH)
#   AZURE_TENANT_ID         — efeoncepro Azure AD tenant id
#   AZURE_SUBSCRIPTION_ID   — target subscription id
#
# NOT created by this workflow:
#   - The Greenhouse bot's own Azure AD app registration (run the
#     `az ad app create` step from `infra/azure/teams-bot/README.md`).
#   - The Teams app manifest upload (interactive, Teams Admin Center).
#   - The GCP Secret Manager secret holding the bot client_credentials blob.

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        type: choice
        required: true
        default: production
        options:
          - staging
          - production
      force_infra_deploy:
        description: 'Force Bicep deploy regardless of diff (TASK-853)'
        type: boolean
        required: false
        default: false
  push:
    branches:
      - main
    paths:
      - 'infra/azure/teams-bot/**'
      - '.github/workflows/azure-teams-bot-deploy.yml'
  workflow_call:
    inputs:
      environment:
        description: 'Target environment (staging | production)'
        type: string
        required: true
      target_sha:
        description: 'Target git SHA (for diff detection vs origin/main)'
        type: string
        required: true
      force_infra_deploy:
        description: 'Force Bicep deploy regardless of diff'
        type: boolean
        required: false
        default: false
    secrets:
      AZURE_CLIENT_ID:
        required: true
      AZURE_TENANT_ID:
        required: true
      AZURE_SUBSCRIPTION_ID:
        required: true

permissions:
  id-token: write
  contents: read

jobs:
  health-check:
    name: Health check Azure (preflight-style)
    runs-on: ubuntu-latest
    environment: >-
      ${{
        github.event_name == 'workflow_call'
          && inputs.environment
          || (github.event_name == 'workflow_dispatch'
              && github.event.inputs.environment
              || 'production')
      }}
    outputs:
      env_label: ${{ steps.env.outputs.env_label }}
      rg_name: ${{ steps.env.outputs.rg_name }}
      params_file: ${{ steps.env.outputs.params_file }}
    steps:
      - uses: actions/checkout@v5

      - name: Resolve environment label
        id: env
        run: |
          if [ "${{ github.event_name }}" = "workflow_call" ]; then
            ENV_INPUT="${{ inputs.environment }}"
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            ENV_INPUT="${{ github.event.inputs.environment }}"
          else
            ENV_INPUT="production"
          fi
          if [ -z "$ENV_INPUT" ]; then
            ENV_INPUT="production"
          fi
          if [ "$ENV_INPUT" = "production" ]; then
            echo "env_label=prod" >> "$GITHUB_OUTPUT"
            echo "rg_name=rg-greenhouse-teams-bot-prod" >> "$GITHUB_OUTPUT"
            echo "params_file=infra/azure/teams-bot/parameters.prod.json" >> "$GITHUB_OUTPUT"
          else
            echo "env_label=dev" >> "$GITHUB_OUTPUT"
            echo "rg_name=rg-greenhouse-teams-bot-dev" >> "$GITHUB_OUTPUT"
            echo "params_file=infra/azure/teams-bot/parameters.dev.json" >> "$GITHUB_OUTPUT"
          fi

      - name: Azure login (Workload Identity Federation)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Verify provider Microsoft.BotService registered
        run: |
          az provider register --namespace Microsoft.BotService --wait
          echo "✓ Provider Microsoft.BotService registered"

      - name: Verify resource group exists or create it
        run: |
          az group create \
            --name "${{ steps.env.outputs.rg_name }}" \
            --location eastus \
            --tags greenhouse:component=teams-bot greenhouse:environment=${{ steps.env.outputs.env_label }}
          echo "✓ Resource group ${{ steps.env.outputs.rg_name }} ready"

  validate:
    name: Validate Bicep template
    runs-on: ubuntu-latest
    needs: [health-check]
    steps:
      - uses: actions/checkout@v5

      - name: Install Azure CLI Bicep
        run: az bicep install

      - name: Bicep build (lint)
        run: az bicep build --file infra/azure/teams-bot/main.bicep

  diff-detection:
    name: Detect Bicep diff vs origin/main
    runs-on: ubuntu-latest
    needs: [health-check, validate]
    outputs:
      should_deploy: ${{ steps.diff.outputs.should_deploy }}
      reason: ${{ steps.diff.outputs.reason }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Compute should_deploy
        id: diff
        env:
          FORCE_FLAG: >-
            ${{
              (github.event_name == 'workflow_call' && inputs.force_infra_deploy)
                || (github.event_name == 'workflow_dispatch' && github.event.inputs.force_infra_deploy == 'true')
            }}
          TARGET_SHA: >-
            ${{
              github.event_name == 'workflow_call'
                && inputs.target_sha
                || github.sha
            }}
        run: |
          if [ "${FORCE_FLAG}" = "true" ]; then
            echo "should_deploy=true" >> "$GITHUB_OUTPUT"
            echo "reason=force_infra_deploy=true" >> "$GITHUB_OUTPUT"
            echo "::notice::force_infra_deploy=true → Bicep apply will run"
            exit 0
          fi

          if [ "${{ github.event_name }}" = "push" ]; then
            echo "should_deploy=true" >> "$GITHUB_OUTPUT"
            echo "reason=push_path_filter_matched" >> "$GITHUB_OUTPUT"
            echo "::notice::Push trigger with path filter match → Bicep apply will run"
            exit 0
          fi

          DIFF_OUTPUT=$(git diff --name-only origin/main~1...${TARGET_SHA} -- 'infra/azure/teams-bot/**' || true)

          if [ -n "${DIFF_OUTPUT}" ]; then
            echo "should_deploy=true" >> "$GITHUB_OUTPUT"
            echo "reason=infra_diff_detected" >> "$GITHUB_OUTPUT"
            echo "::notice::Infra diff detected in infra/azure/teams-bot/**:"
            echo "${DIFF_OUTPUT}"
          else
            echo "should_deploy=false" >> "$GITHUB_OUTPUT"
            echo "reason=no_infra_diff" >> "$GITHUB_OUTPUT"
            echo "::notice::No diff in infra/azure/teams-bot/** since last main → Bicep apply skipped"
          fi

  deploy:
    name: Deploy Teams Bot stack
    needs: [health-check, validate, diff-detection]
    if: ${{ needs.diff-detection.outputs.should_deploy == 'true' }}
    runs-on: ubuntu-latest
    environment: >-
      ${{
        github.event_name == 'workflow_call'
          && inputs.environment
          || (github.event_name == 'workflow_dispatch'
              && github.event.inputs.environment
              || 'production')
      }}
    steps:
      - uses: actions/checkout@v5

      - name: Azure login (Workload Identity Federation)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy Bicep template
        id: deploy
        env:
          RG_NAME: ${{ needs.health-check.outputs.rg_name }}
          PARAMS_FILE: ${{ needs.health-check.outputs.params_file }}
        run: |
          DEPLOY_NAME="gh-bot-$(date +%Y%m%d-%H%M%S)"
          az deployment group create \
            --resource-group "${RG_NAME}" \
            --name "$DEPLOY_NAME" \
            --template-file infra/azure/teams-bot/main.bicep \
            --parameters "${PARAMS_FILE}"

          echo "Deployment '$DEPLOY_NAME' completed."
          az deployment group show \
            --resource-group "${RG_NAME}" \
            --name "$DEPLOY_NAME" \
            --query properties.outputs

      - name: Reminder — manual follow-ups
        run: |
          echo "::notice::Bot Service deployed. Manual follow-ups:"
          echo "::notice::1) Upload the Teams app manifest at https://admin.teams.microsoft.com/policies/manage-apps"
          echo "::notice::2) Install the bot in each target team (Alineación, Finance, Delivery)"
          echo "::notice::3) UPDATE greenhouse_core.teams_notification_channels SET channel_kind='teams_bot', team_id, channel_id for ops-alerts | finance-alerts | delivery-pulse"
          echo "::notice::4) Validate via 'pnpm staging:request POST /api/admin/teams/test {\"channelCode\":\"ops-alerts\"}'"

  skip-deploy-summary:
    name: Skip Bicep deploy (no diff)
    needs: [health-check, validate, diff-detection]
    if: ${{ needs.diff-detection.outputs.should_deploy == 'false' }}
    runs-on: ubuntu-latest
    steps:
      - name: Annotate skip reason
        run: |
          echo "## Azure Teams Bot — Bicep skip" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Skip reason: \`${{ needs.diff-detection.outputs.reason }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Health check Azure passed (WIF login + providers + RG ready)." >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Override: dispatch with \`force_infra_deploy=true\` to apply Bicep regardless of diff." >> "$GITHUB_STEP_SUMMARY"
          echo "::notice::Bicep apply skipped: ${{ needs.diff-detection.outputs.reason }}"
