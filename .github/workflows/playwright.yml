name: Playwright E2E smoke

on:
  workflow_dispatch:
    inputs:
      base_url:
        description: 'Base URL to hit (leave empty to use PLAYWRIGHT_BASE_URL secret)'
        required: false
        default: ''
  push:
    branches:
      - develop

permissions:
  contents: read
  id-token: write # Required for Workload Identity Federation to GCP (Cloud SQL Connector for the smoke-lane publisher)

concurrency:
  group: playwright-e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    name: Chromium smoke suite
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      CI: true
      NEXT_TELEMETRY_DISABLED: 1
      PLAYWRIGHT_BASE_URL: ${{ github.event.inputs.base_url || secrets.PLAYWRIGHT_BASE_URL }}
      AGENT_AUTH_SECRET: ${{ secrets.AGENT_AUTH_SECRET }}
      AGENT_AUTH_EMAIL: ${{ secrets.AGENT_AUTH_EMAIL || 'agent@greenhouse.efeonce.org' }}
      VERCEL_AUTOMATION_BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
    steps:
      - name: Guard — require base URL + agent secret
        run: |
          if [ -z "$PLAYWRIGHT_BASE_URL" ]; then
            echo "::error::PLAYWRIGHT_BASE_URL is empty. Set repo secret PLAYWRIGHT_BASE_URL or pass via workflow_dispatch input."
            exit 1
          fi
          if [ -z "$AGENT_AUTH_SECRET" ]; then
            echo "::error::AGENT_AUTH_SECRET secret missing."
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright Chromium
        run: pnpm exec playwright install --with-deps chromium

      - name: Run Playwright smoke suite
        run: pnpm test:e2e

      - name: Upload HTML report
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: playwright-report
          if-no-files-found: warn
          path: playwright-report/
          retention-days: 14

      - name: Upload results JSON + traces
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: playwright-artifacts
          if-no-files-found: warn
          path: |
            artifacts/playwright/**
            test-results/**
          retention-days: 14

      # ─── Publish smoke-lane runs to PG ─────────────────────────────────
      # Persists per-lane Playwright results to `greenhouse_sync.smoke_lane_runs`
      # so the reliability dashboard reader can surface the latest status from
      # any runtime (Vercel, Cloud Run, MCP) without depending on the CI
      # filesystem. See docs/architecture/GREENHOUSE_NOTION_DELIVERY_SYNC_V1.md
      # and the "Reliability dashboard hygiene" section in CLAUDE.md.
      #
      # Best-effort: if the publisher fails (PG down, missing secret) we don't
      # fail the workflow — the suite already passed/failed and that's the
      # primary signal. The dashboard just stays on the previous row until
      # the next run lands.
      - name: Authenticate to GCP (smoke-lane publisher)
        if: always()
        id: gcp-auth-publisher
        uses: google-github-actions/auth@v3
        continue-on-error: true
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: github-actions-deployer@efeonce-group.iam.gserviceaccount.com

      - name: Publish smoke-lane results to PG
        if: always() && steps.gcp-auth-publisher.outcome == 'success'
        continue-on-error: true
        env:
          GREENHOUSE_POSTGRES_INSTANCE_CONNECTION_NAME: efeonce-group:us-east4:greenhouse-pg-dev
          GREENHOUSE_POSTGRES_DATABASE: greenhouse_app
          GREENHOUSE_POSTGRES_USER: greenhouse_app
          GREENHOUSE_POSTGRES_PASSWORD_SECRET_REF: greenhouse-pg-dev-app-password
          GREENHOUSE_POSTGRES_IP_TYPE: PUBLIC
          GREENHOUSE_POSTGRES_MAX_CONNECTIONS: '1'
        run: |
          set -e
          if [ ! -f artifacts/playwright/results.json ]; then
            echo "::warning::artifacts/playwright/results.json not found — skipping smoke-lane publish."
            exit 0
          fi
          # One row per lane. The publisher script filters the JSON internally
          # via the `lane_key` we pass; today all smoke specs share one report
          # so we publish per logical lane that has finance/delivery/identity
          # specs in the suite. Lane keys are the canonical identifiers from
          # the reliability registry.
          for LANE in finance.web delivery.web identity.web; do
            echo "::group::Publishing smoke-lane $LANE"
            pnpm sync:smoke-lane "$LANE" \
              --report=artifacts/playwright/results.json \
              --commit="${GITHUB_SHA}" \
              --branch="${GITHUB_REF_NAME}" \
              || echo "::warning::sync:smoke-lane $LANE failed (non-blocking)."
            echo "::endgroup::"
          done
