    source_plate: work/plates/high-frequency-plate-4x5-source.png
    finished_plate: work/layout-design/finished/high-frequency-layout-finish-4x5.png
    output: delivery/layout-compiler/high-frequency-layout-design-4x5-v1.jpg
    baseline:
      output: delivery/layout-design/high-frequency-layout-design-4x5-v1.jpg
      max_normalized_mae: 0.002
    copy_field: { x: 0.063, y: 0.18, width: 0.61, height: 0.33 }
    safe_zones: { top: 0.04, right: 0.04, bottom: 0.04, left: 0.05 }
    finish:
      status: approved
      executor: bytedance/seedream/v5/pro/edit
      delta: improve material integration, atmospheric depth and micro-detail only
      input_policy: clean plate only; no final copy, logo, CTA or legal
    layout:
      copy_fade_mid: 0.58
      copy_fade_end: 0.82
      logo: { left: 70, top: 62, width: 220 }
      kicker: { x: 98, y: 252, size: 15, tracking: 1.8 }
      hook: { x: 70, y: 232, width: 5, height: 158 }
      headline: { x: 98, y: 345, size: 66, gap: 78, tracking: -1 }
      support: { x: 98, y: 548, size: 25, max_width: 510, gap: 36, tracking: 0 }
      url: { x: 70, y: 1268, size: 21, tracking: 0.25 }
      rule: { x: 70, y: 1225, width: 210, height: 2 }

  - id: 9x16
    ratio: '9:16'
    canvas: { width: 1080, height: 1920 }
    grid: { columns: 6, margin_pct: 6.5, gutter_pct: 3 }
    source_plate: work/plates/high-frequency-plate-9x16-source.png
    finished_plate: work/layout-design/finished/high-frequency-layout-finish-9x16.png
    output: delivery/layout-compiler/high-frequency-layout-design-9x16-v1.jpg
    baseline:
      output: delivery/layout-design/high-frequency-layout-design-9x16-v1.jpg
      max_normalized_mae: 0.002
    copy_field: { x: 0.065, y: 0.2, width: 0.58, height: 0.3 }
    safe_zones: { top: 0.12, right: 0.05, bottom: 0.2, left: 0.06 }
    finish:
      status: approved
      executor: bytedance/seedream/v5/pro/edit
      delta: improve material integration, atmospheric depth and micro-detail only
      input_policy: clean plate only; no final copy, logo, CTA or legal
    layout:
      copy_fade_mid: 0.58
      copy_fade_end: 0.82
      logo: { left: 72, top: 235, width: 230 }
      kicker: { x: 100, y: 420, size: 15, tracking: 1.8 }
      hook: { x: 72, y: 398, width: 5, height: 174 }
      headline: { x: 100, y: 520, size: 69, gap: 82, tracking: -1 }
      support: { x: 100, y: 735, size: 26, max_width: 520, gap: 38, tracking: 0 }
      url: { x: 72, y: 1492, size: 23, tracking: 0.25 }
      rule: { x: 72, y: 1445, width: 230, height: 2 }

gates:
  - anchor
  - layout
  - finish
  - craft
  - format
  - technical
  - human_release
