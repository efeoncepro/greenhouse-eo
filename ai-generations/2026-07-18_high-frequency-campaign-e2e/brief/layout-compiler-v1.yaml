version: campaign-layout-compiler.v1
campaign_id: high-frequency-layout-design
run_root: ..

anchor:
  id: high-frequency-anchor-v1
  revision: 1
  asset: work/anchor/high-frequency-anchor-v1.png
  status: approved
  locks:
    - exactly one complete hummingbird
    - right-facing beak and approved anatomy
    - deep navy field with cyan, mint and violet modular wake
    - one coherent right-side rim light

brand_mode: branded
channel_mode: digital-static

message:
  kicker: PRODUCCIÓN CREATIVA · SISTEMA 01
  headline:
    - ALTA FRECUENCIA.
    - ALTO ESTÁNDAR.
  support: Producción creativa a escala, sin bajar el nivel.
  url: efeoncepro.com

brand:
  logo: ../../public/branding/logo-negative.svg
  fonts:
    medium: ../../src/assets/fonts/Poppins-Medium.ttf
    bold: ../../src/assets/fonts/Poppins-Bold.ttf
    extra_bold: ../../src/assets/fonts/Poppins-ExtraBold.ttf
  colors:
    background: '#03142D'
    foreground: '#FFFFFF'
    support: '#F4F8FF'
    muted: '#B8C9DE'
    accent: '#7CF4D1'
    accent_secondary: '#2FD7FF'

visual_system:
  underlay:
    color: '#03142D'
    copy_opacity_start: 0.78
    copy_opacity_mid: 0.45
    top_opacity: 0.42
    vignette_opacity: 0.28
  hook:
    type: frequency-rail
    colors:
      - '#2FD7FF'
      - '#7CF4D1'
      - '#9C63FF'

composition:
  renderer: sharp-fontkit
  output_format: jpeg
  quality: 94
  max_bytes: 5242880
  contact_sheet_columns: 2

approvals:
  layout: approved
  human_release: approved
  anchor_owner: creative-director
  release_owner: campaign-owner

artifacts:
  plan_manifest: manifests/14-layout-compiler-plan.json
  composition_manifest: manifests/15-layout-compiler-composition.json
  qa_report: qa/layout-compiler-technical.json
  contact_sheet: review/layout-compiler-contact-sheet.jpg
  editable_dir: work/layout-compiler/editable

formats:
  - id: 16x9
    ratio: '16:9'
    canvas: { width: 1920, height: 1080 }
    grid: { columns: 12, margin_pct: 4.58, gutter_pct: 2 }
    source_plate: work/plates/high-frequency-plate-3x1-source.png
    finished_plate: work/layout-design/finished/high-frequency-layout-finish-16x9.png
    output: delivery/layout-compiler/high-frequency-layout-design-16x9-v1.jpg
    baseline:
      output: delivery/layout-design/high-frequency-layout-design-16x9-v1.jpg
      max_normalized_mae: 0.002
    copy_field: { x: 0.0458, y: 0.22, width: 0.43, height: 0.48 }
    safe_zones: { top: 0.04, right: 0.04, bottom: 0.04, left: 0.04 }
    finish:
      status: approved
      executor: bytedance/seedream/v5/pro/edit
      delta: improve material integration, atmospheric depth and micro-detail only
      input_policy: clean plate only; no final copy, logo, CTA or legal
    layout:
      copy_fade_mid: 0.43
      copy_fade_end: 0.66
      logo: { left: 88, top: 70, width: 245 }
      kicker: { x: 116, y: 275, size: 18, tracking: 2.2 }
      hook: { x: 88, y: 252, width: 6, height: 186 }
      headline: { x: 116, y: 390, size: 79, gap: 92, tracking: -1.2 }
      support: { x: 116, y: 650, size: 29, max_width: 560, gap: 42, tracking: 0 }
      url: { x: 88, y: 996, size: 24, tracking: 0.25 }
      rule: { x: 88, y: 946, width: 250, height: 2 }

  - id: 4x5
    ratio: '4:5'
    canvas: { width: 1080, height: 1350 }
