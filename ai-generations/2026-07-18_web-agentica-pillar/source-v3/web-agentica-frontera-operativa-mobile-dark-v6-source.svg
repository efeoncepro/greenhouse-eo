<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="1600" viewBox="0 0 1200 1600" role="img" aria-labelledby="title desc"><title id="title">De interfaz a contrato operativo</title><desc id="desc">Cuatro estados muestran cómo disminuye la inferencia y aumentan operabilidad y gobierno.</desc><rect width="1200" height="1600" fill="#111013"/><text x="68" y="76" font-family="Poppins" font-size="16" font-weight="700" fill="#FF7A2F" text-anchor="start" letter-spacing="2.1" opacity="1">WEB AGÉNTICA · FRONTERA OPERATIVA</text>
    <text x="68" y="148" font-family="Poppins" font-size="47" font-weight="700" fill="#F7F7F8" text-anchor="start" letter-spacing="0" opacity="1">De interfaz a contrato operativo</text>
    <text x="68" y="194" font-family="Poppins" font-size="19" font-weight="400" fill="#B9BAC1" text-anchor="start" letter-spacing="0" opacity="1">Del clic humano a una acción explícita, gobernada y demostrable.</text>
