<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000" role="img" aria-labelledby="title desc">
  <title id="title">Cadena de autoridad para agentes</title><desc id="desc">Una persona delega una intención a un agente u operador; la capacidad del sitio valida identidad, alcance y confirmación antes de registrar un resultado auditable y recuperable.</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%"><feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#00131d" flood-opacity=".28"/></filter>
    <marker id="arrow" markerWidth="11" markerHeight="11" refX="9" refY="5.5" orient="auto"><path d="M0 0L10 5.5L0 11Z" fill="#21c9bd"/></marker>
    <style>
      text{font-family:Poppins,Arial,sans-serif}.kicker{font-size:22px;font-weight:700;letter-spacing:3px;fill:#21c9bd}.title{font-weight:760;fill:#f7f7f8}.subtitle{font-size:23px;fill:#c4c4c8}.label{font-size:20px;font-weight:700;letter-spacing:2px}.h{font-size:30px;font-weight:760;fill:#f7f7f8}.body{font-size:21px;fill:#c4c4c8}.small{font-size:18px;fill:#c4c4c8}
    </style>
  </defs>
  <rect width="1600" height="1000" fill="#111013"/>


    <text x="86" y="92" class="kicker">CONFIANZA OPERATIVA</text>
    <image href="data:image/svg+xml;base64," x="1326" y="58" width="188" height="45" preserveAspectRatio="xMidYMid meet"/>
    <text x="86" y="170" class="title" font-size="54">Cadena de autoridad para agentes</text>
    <text x="86" y="220" class="subtitle">Identidad no equivale a permiso delegado. La acción debe probar toda la cadena.</text>
    <g transform="translate(86 258)">
      <g data-containment="authority-step" transform="translate(0 0)"><rect width="330" height="210" rx="22" fill="#1c1b1e" stroke="#f0cb63" stroke-width="3"/><rect width="330" height="8" rx="4" fill="#f0cb63"/><circle cx="42" cy="48" r="23" fill="#f0cb63"/><text x="42" y="55" text-anchor="middle" font-size="17" font-weight="800" fill="#111013">01</text><text x="78" y="44" font-size="16" font-weight="760" letter-spacing="1.25" fill="#f0cb63">PERSONA</text><text x="26" y="108" class="h" style="font-size:25px">Define la intención</text><text x="26" y="150" font-size="17" fill="#c4c4c8">Objetivo · límites · vigencia</text><text x="26" y="184" font-size="15" font-weight="650" fill="#f0cb63">VERIFICA ANTES DE AVANZAR</text></g><path d="M330 105H360" stroke="#21c9bd" stroke-width="4" marker-end="url(#arrow)"/><g data-containment="authority-step" transform="translate(360 0)"><rect width="330" height="210" rx="22" fill="#1c1b1e" stroke="#21c9bd" stroke-width="3"/><rect width="330" height="8" rx="4" fill="#21c9bd"/><circle cx="42" cy="48" r="23" fill="#21c9bd"/><text x="42" y="55" text-anchor="middle" font-size="17" font-weight="800" fill="#111013">02</text><text x="78" y="44" font-size="16" font-weight="760" letter-spacing="1.25" fill="#21c9bd">AGENTE / OPERADOR</text><text x="26" y="108" class="h" style="font-size:25px">Presenta identidad</text><text x="26" y="150" font-size="17" fill="#c4c4c8">Representación · contexto</text><text x="26" y="184" font-size="15" font-weight="650" fill="#21c9bd">VERIFICA ANTES DE AVANZAR</text></g><path d="M690 105H720" stroke="#21c9bd" stroke-width="4" marker-end="url(#arrow)"/><g data-containment="authority-step" transform="translate(720 0)"><rect width="330" height="210" rx="22" fill="#1c1b1e" stroke="#5aa7df" stroke-width="3"/><rect width="330" height="8" rx="4" fill="#5aa7df"/><circle cx="42" cy="48" r="23" fill="#5aa7df"/><text x="42" y="55" text-anchor="middle" font-size="17" font-weight="800" fill="#111013">03</text><text x="78" y="44" font-size="16" font-weight="760" letter-spacing="1.25" fill="#5aa7df">CAPACIDAD DEL SITIO</text><text x="26" y="108" class="h" style="font-size:25px">Valida autoridad</text><text x="26" y="150" font-size="17" fill="#c4c4c8">Alcance · riesgo · confirmación</text><text x="26" y="184" font-size="15" font-weight="650" fill="#5aa7df">VERIFICA ANTES DE AVANZAR</text></g><path d="M1050 105H1080" stroke="#21c9bd" stroke-width="4" marker-end="url(#arrow)"/><g data-containment="authority-step" transform="translate(1080 0)"><rect width="330" height="210" rx="22" fill="#1c1b1e" stroke="#9be766" stroke-width="3"/><rect width="330" height="8" rx="4" fill="#9be766"/><circle cx="42" cy="48" r="23" fill="#9be766"/><text x="42" y="55" text-anchor="middle" font-size="17" font-weight="800" fill="#111013">04</text><text x="78" y="44" font-size="16" font-weight="760" letter-spacing="1.25" fill="#9be766">SISTEMA DE REGISTRO</text><text x="26" y="108" class="h" style="font-size:25px">Demuestra el resultado</text><text x="26" y="150" font-size="17" fill="#c4c4c8">Registro · revocar · recuperar</text><text x="26" y="184" font-size="15" font-weight="650" fill="#9be766">CIERRA EL CICLO</text></g>
      <text x="0" y="270" class="label" fill="#21c9bd">CUATRO GATES QUE LA ACCIÓN DEBE SUPERAR</text>
      <g data-containment="authority-gate" transform="translate(0 302)"><rect width="330" height="225" rx="22" fill="#1c1b1e" stroke="#55545a" stroke-width="2"/><text x="24" y="39" font-size="15" font-weight="760" letter-spacing="1.15" fill="#21c9bd">IDENTIDAD</text><text x="24" y="89" class="h" style="font-size:24px"><tspan x="24" dy="0">¿Quién</tspan><tspan x="24" dy="30">actúa?</tspan></text><line x1="24" y1="156" x2="306" y2="156" stroke="#55545a"/><text x="24" y="193" font-size="17" fill="#c4c4c8">Agente + operador</text></g><g data-containment="authority-gate" transform="translate(360 302)"><rect width="330" height="225" rx="22" fill="#252428" stroke="#55545a" stroke-width="2"/><text x="24" y="39" font-size="15" font-weight="760" letter-spacing="1.15" fill="#5aa7df">ALCANCE DELEGADO</text><text x="24" y="89" class="h" style="font-size:24px"><tspan x="24" dy="0">¿En nombre de</tspan><tspan x="24" dy="30">quién y para qué?</tspan></text><line x1="24" y1="156" x2="306" y2="156" stroke="#55545a"/><text x="24" y="193" font-size="17" fill="#c4c4c8">Propósito + vigencia</text></g><g data-containment="authority-gate" transform="translate(720 302)"><rect width="330" height="225" rx="22" fill="#1c1b1e" stroke="#55545a" stroke-width="2"/><text x="24" y="39" font-size="15" font-weight="760" letter-spacing="1.15" fill="#f0cb63">CONFIRMACIÓN</text><text x="24" y="89" class="h" style="font-size:24px"><tspan x="24" dy="0">¿Qué debe aprobar</tspan><tspan x="24" dy="30">una persona?</tspan></text><line x1="24" y1="156" x2="306" y2="156" stroke="#55545a"/><text x="24" y="193" font-size="17" fill="#c4c4c8">Control proporcional</text></g><g data-containment="authority-gate" transform="translate(1080 302)"><rect width="330" height="225" rx="22" fill="#252428" stroke="#55545a" stroke-width="2"/><text x="24" y="39" font-size="15" font-weight="760" letter-spacing="1.15" fill="#9be766">EVIDENCIA</text><text x="24" y="89" class="h" style="font-size:24px"><tspan x="24" dy="0">¿Qué ocurrió y</tspan><tspan x="24" dy="30">cómo se recupera?</tspan></text><line x1="24" y1="156" x2="306" y2="156" stroke="#55545a"/><text x="24" y="193" font-size="17" fill="#c4c4c8">Registro + reversión</text></g>
      <rect x="0" y="563" width="1410" height="92" rx="22" fill="#0d3557" stroke="#21c9bd" stroke-width="3"/><text x="705" y="620" text-anchor="middle" font-size="25" font-weight="760" fill="#fff">Identificar al agente no basta: hay que probar autoridad, límite y resultado.</text>
    </g>
  </svg>