<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="1600" viewBox="0 0 1200 1600" role="img" aria-labelledby="title desc">
  <title id="title">Una base, dos formas de operar</title><desc id="desc">Personas y agentes consumen una capacidad compartida bajo un contrato, gobierno, datos y reglas comunes.</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%"><feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#00131d" flood-opacity=".12"/></filter>
    <marker id="arrow" markerWidth="11" markerHeight="11" refX="9" refY="5.5" orient="auto"><path d="M0 0L10 5.5L0 11Z" fill="#008f87"/></marker>
    <style>
      text{font-family:Poppins,Arial,sans-serif}.kicker{font-size:22px;font-weight:700;letter-spacing:3px;fill:#008f87}.title{font-weight:760;fill:#103447}.subtitle{font-size:23px;fill:#526b75}.label{font-size:20px;font-weight:700;letter-spacing:2px}.h{font-size:30px;font-weight:760;fill:#103447}.body{font-size:21px;fill:#526b75}.small{font-size:18px;fill:#526b75}
    </style>
  </defs>
  <rect width="1200" height="1600" fill="#ffffff"/>


    <text x="72" y="92" class="kicker">ARQUITECTURA COMPARTIDA</text>
    <image href="data:image/svg+xml;base64," x="960" y="58" width="168" height="45" preserveAspectRatio="xMidYMid meet"/>
    <text x="72" y="170" class="title" font-size="58">Una base, dos formas de operar</text>
    <text x="72" y="220" class="subtitle">Personas y agentes llegan por interfaces distintas a una misma base gobernada.</text>
    <g transform="translate(72 240)">
      <g data-containment="architecture" transform="translate(0 0)"><rect width="1056" height="160" rx="22" fill="#ffffff" stroke="#9a7416" stroke-width="3"/><text x="28" y="38" font-size="16" font-weight="760" letter-spacing="1.4" fill="#9a7416">PERSONA</text><text x="28" y="78" class="h">Interfaz humana</text><text x="28" y="116" font-size="19" fill="#526b75">Páginas · navegación · formularios</text></g><g data-containment="architecture" transform="translate(0 184)"><rect width="1056" height="160" rx="22" fill="#ffffff" stroke="#008f87" stroke-width="3"/><text x="28" y="38" font-size="16" font-weight="760" letter-spacing="1.4" fill="#008f87">AGENTE</text><text x="28" y="78" class="h">Interfaz estructurada</text><text x="28" y="116" font-size="19" fill="#526b75">WebMCP · API · MCP</text></g>
      <path d="M528 358V394" stroke="#008f87" stroke-width="4" marker-end="url(#arrow)"/>
      <g data-containment="architecture" transform="translate(0 410)"><rect width="1056" height="200" rx="22" fill="#ffffff" stroke="#2277b7" stroke-width="3"/><text x="28" y="38" font-size="16" font-weight="760" letter-spacing="1.4" fill="#2277b7">CAPACIDAD COMPARTIDA</text><text x="28" y="78" class="h">Un trabajo de negocio</text><text x="28" y="116" font-size="19" fill="#526b75">Descubrir · evaluar · preparar</text><text x="28" y="148" font-size="19" fill="#526b75">Ejecutar · recuperar</text></g>
      <path d="M528 624V660" stroke="#008f87" stroke-width="4" marker-end="url(#arrow)"/>
      <g data-containment="architecture" transform="translate(0 676)"><rect width="1056" height="194" rx="22" fill="#ffffff" stroke="#2277b7" stroke-width="3"/><text x="28" y="38" font-size="16" font-weight="760" letter-spacing="1.4" fill="#2277b7">CONTRATO DE EJECUCIÓN</text><text x="28" y="78" class="h">Predecible en cualquier canal</text><text x="28" y="116" font-size="19" fill="#526b75">Entradas · resultados · validaciones · errores</text><text x="28" y="148" font-size="19" fill="#526b75">Idempotencia · observabilidad</text></g>
      <g data-containment="architecture" transform="translate(0 894)"><rect width="1056" height="230" rx="22" fill="#f3f5f6" stroke="#528f2f" stroke-width="3"/><text x="28" y="38" font-size="16" font-weight="760" letter-spacing="1.4" fill="#528f2f">GOBIERNO PROPORCIONAL AL RIESGO</text><text x="28" y="78" class="h">La autonomía se gana con evidencia</text><text x="28" y="116" font-size="19" fill="#526b75">Identidad · alcance · vista previa · confirmación</text><text x="28" y="148" font-size="19" fill="#526b75">Auditoría · revocación · handoff · recuperación</text></g>
      <path d="M528 1138V1174" stroke="#008f87" stroke-width="4" marker-end="url(#arrow)"/>
      <g data-containment="architecture" transform="translate(0 1190)"><rect width="1056" height="118" rx="22" fill="#023c70" stroke="#008f87" stroke-width="3"/><text x="28" y="38" font-size="16" font-weight="760" letter-spacing="1.4" fill="#008f87">FUENTE DE VERDAD</text><text x="28" y="82" font-size="27" font-weight="760" fill="#fff">DATOS + REGLAS + PERMISOS + REGISTRO</text></g>
      <text x="0" y="1342" font-size="24" font-weight="760" fill="#103447">Una capacidad. Varias interfaces. Una responsabilidad.</text>
    </g>
