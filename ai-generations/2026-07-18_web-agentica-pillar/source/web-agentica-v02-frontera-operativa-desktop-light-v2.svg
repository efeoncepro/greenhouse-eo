<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000" role="img" aria-labelledby="title desc">
  <title id="title">De una interfaz a un contrato operativo</title><desc id="desc">Cuatro tipos de sitio comparados por operador, comprensión del agente, capacidad, control y señal de éxito.</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%"><feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#00131d" flood-opacity=".12"/></filter>
    <marker id="arrow" markerWidth="11" markerHeight="11" refX="9" refY="5.5" orient="auto"><path d="M0 0L10 5.5L0 11Z" fill="#008f87"/></marker>
    <style>
      text{font-family:Poppins,Arial,sans-serif}.kicker{font-size:22px;font-weight:700;letter-spacing:3px;fill:#008f87}.title{font-weight:760;fill:#103447}.subtitle{font-size:23px;fill:#526b75}.label{font-size:20px;font-weight:700;letter-spacing:2px}.h{font-size:30px;font-weight:760;fill:#103447}.body{font-size:21px;fill:#526b75}.small{font-size:18px;fill:#526b75}
    </style>
  </defs>
  <rect width="1600" height="1000" fill="#ffffff"/>


    <text x="86" y="92" class="kicker">WEB AGÉNTICA · FRONTERA OPERATIVA</text>
    <image href="data:image/svg+xml;base64," x="1326" y="58" width="188" height="45" preserveAspectRatio="xMidYMid meet"/>
    <text x="86" y="170" class="title" font-size="54">De una interfaz a un contrato operativo</text>
    <text x="86" y="220" class="subtitle">La diferencia no es cuánta IA existe, sino cuánto debe inferir un agente para avanzar.</text>
    <g transform="translate(86 266)">
      <g data-containment="stage" transform="translate(0 0)">
        <rect width="336" height="566" rx="22" fill="#ffffff" stroke="#c4d2d6" stroke-width="2"/>
        <rect width="336" height="8" rx="4" fill="#c4d2d6"/>
        <circle cx="42" cy="48" r="23" fill="#c4d2d6"/><text x="42" y="55" text-anchor="middle" font-size="17" font-weight="800" fill="#fff">01</text>
        <text x="78" y="44" font-size="18" font-weight="760" letter-spacing="1.6" fill="#c4d2d6">TRADICIONAL</text>
        <text x="26" y="102" class="h" ><tspan x="26" dy="0">La persona</tspan><tspan x="26" dy="31">navega</tspan></text>
        <text x="26" y="174" font-size="16" fill="#526b75">La interfaz es el producto</text><line x1="26" y1="198" x2="310" y2="198" stroke="#c4d2d6"/>
        <text x="26" y="224" font-size="14" font-weight="760" letter-spacing="1.2" fill="#c4d2d6">OPERADOR</text><text x="26" y="249" font-size="16" fill="#103447">Persona</text><line x1="26" y1="276" x2="310" y2="276" stroke="#c4d2d6" opacity=".65"/><text x="26" y="290" font-size="14" font-weight="760" letter-spacing="1.2" fill="#c4d2d6">EL AGENTE</text><text x="26" y="315" font-size="16" fill="#103447">Interpreta la pantalla</text><line x1="26" y1="342" x2="310" y2="342" stroke="#c4d2d6" opacity=".65"/><text x="26" y="356" font-size="14" font-weight="760" letter-spacing="1.2" fill="#c4d2d6">CAPACIDAD</text><text x="26" y="381" font-size="16" fill="#103447">Contenido + formularios</text><line x1="26" y1="408" x2="310" y2="408" stroke="#c4d2d6" opacity=".65"/><text x="26" y="422" font-size="14" font-weight="760" letter-spacing="1.2" fill="#c4d2d6">CONTROL</text><text x="26" y="447" font-size="16" fill="#103447">Validación al enviar</text><line x1="26" y1="474" x2="310" y2="474" stroke="#c4d2d6" opacity=".65"/><text x="26" y="488" font-size="14" font-weight="760" letter-spacing="1.2" fill="#c4d2d6">SEÑAL</text><text x="26" y="513" font-size="16" fill="#103447">Sesión + conversión</text>
      </g><g data-containment="stage" transform="translate(360 0)">
        <rect width="336" height="566" rx="22" fill="#ffffff" stroke="#2277b7" stroke-width="2"/>
        <rect width="336" height="8" rx="4" fill="#2277b7"/>
        <circle cx="42" cy="48" r="23" fill="#2277b7"/><text x="42" y="55" text-anchor="middle" font-size="17" font-weight="800" fill="#fff">02</text>
        <text x="78" y="44" font-size="18" font-weight="760" letter-spacing="1.6" fill="#2277b7">CON IA</text>
        <text x="26" y="102" class="h" ><tspan x="26" dy="0">La IA asiste</tspan><tspan x="26" dy="31">dentro</tspan></text>
        <text x="26" y="174" font-size="16" fill="#526b75">La ayuda vive en el sitio</text><line x1="26" y1="198" x2="310" y2="198" stroke="#c4d2d6"/>
        <text x="26" y="224" font-size="14" font-weight="760" letter-spacing="1.2" fill="#2277b7">OPERADOR</text><text x="26" y="249" font-size="16" fill="#103447">Persona + asistente</text><line x1="26" y1="276" x2="310" y2="276" stroke="#c4d2d6" opacity=".65"/><text x="26" y="290" font-size="14" font-weight="760" letter-spacing="1.2" fill="#2277b7">EL AGENTE</text><text x="26" y="315" font-size="16" fill="#103447">Responde con contexto local</text><line x1="26" y1="342" x2="310" y2="342" stroke="#c4d2d6" opacity=".65"/><text x="26" y="356" font-size="14" font-weight="760" letter-spacing="1.2" fill="#2277b7">CAPACIDAD</text><text x="26" y="381" font-size="16" fill="#103447">Chat + personalización</text><line x1="26" y1="408" x2="310" y2="408" stroke="#c4d2d6" opacity=".65"/><text x="26" y="422" font-size="14" font-weight="760" letter-spacing="1.2" fill="#2277b7">CONTROL</text><text x="26" y="447" font-size="16" fill="#103447">Handoff + consentimiento</text><line x1="26" y1="474" x2="310" y2="474" stroke="#c4d2d6" opacity=".65"/><text x="26" y="488" font-size="14" font-weight="760" letter-spacing="1.2" fill="#2277b7">SEÑAL</text><text x="26" y="513" font-size="16" fill="#103447">Resolución + derivación</text>
      </g><g data-containment="stage" transform="translate(720 0)">
        <rect width="336" height="566" rx="22" fill="#ffffff" stroke="#008f87" stroke-width="2"/>
        <rect width="336" height="8" rx="4" fill="#008f87"/>
        <circle cx="42" cy="48" r="23" fill="#008f87"/><text x="42" y="55" text-anchor="middle" font-size="17" font-weight="800" fill="#fff">03</text>
        <text x="78" y="44" font-size="18" font-weight="760" letter-spacing="1.6" fill="#008f87">PREPARADO</text>
        <text x="26" y="102" class="h" ><tspan x="26" dy="0">El agente</tspan><tspan x="26" dy="31">comprende</tspan></text>
        <text x="26" y="174" font-size="16" fill="#526b75">La tarea deja de ser ambigua</text><line x1="26" y1="198" x2="310" y2="198" stroke="#c4d2d6"/>
        <text x="26" y="224" font-size="14" font-weight="760" letter-spacing="1.2" fill="#008f87">OPERADOR</text><text x="26" y="249" font-size="16" fill="#103447">Persona o agente externo</text><line x1="26" y1="276" x2="310" y2="276" stroke="#c4d2d6" opacity=".65"/><text x="26" y="290" font-size="14" font-weight="760" letter-spacing="1.2" fill="#008f87">EL AGENTE</text><text x="26" y="315" font-size="16" fill="#103447">Descubre datos y tareas</text><line x1="26" y1="342" x2="310" y2="342" stroke="#c4d2d6" opacity=".65"/><text x="26" y="356" font-size="14" font-weight="760" letter-spacing="1.2" fill="#008f87">CAPACIDAD</text><text x="26" y="381" font-size="16" fill="#103447">Semántica + accesibilidad</text><line x1="26" y1="408" x2="310" y2="408" stroke="#c4d2d6" opacity=".65"/><text x="26" y="422" font-size="14" font-weight="760" letter-spacing="1.2" fill="#008f87">CONTROL</text><text x="26" y="447" font-size="16" fill="#103447">Entradas + errores explícitos</text><line x1="26" y1="474" x2="310" y2="474" stroke="#c4d2d6" opacity=".65"/><text x="26" y="488" font-size="14" font-weight="760" letter-spacing="1.2" fill="#008f87">SEÑAL</text><text x="26" y="513" font-size="16" fill="#103447">Descubrimiento + éxito</text>
      </g><g data-containment="stage" transform="translate(1080 0)">
        <rect width="336" height="566" rx="22" fill="#f3f5f6" stroke="#528f2f" stroke-width="3"/>
        <rect width="336" height="8" rx="4" fill="#528f2f"/>
        <circle cx="42" cy="48" r="23" fill="#528f2f"/><text x="42" y="55" text-anchor="middle" font-size="17" font-weight="800" fill="#fff">04</text>
        <text x="78" y="44" font-size="18" font-weight="760" letter-spacing="1.6" fill="#528f2f">AGÉNTICO</text>
        <text x="26" y="102" class="h" ><tspan x="26" dy="0">El agente</tspan><tspan x="26" dy="31">opera</tspan></text>
        <text x="26" y="174" font-size="16" fill="#526b75">La acción tiene contrato</text><line x1="26" y1="198" x2="310" y2="198" stroke="#c4d2d6"/>
        <text x="26" y="224" font-size="14" font-weight="760" letter-spacing="1.2" fill="#528f2f">OPERADOR</text><text x="26" y="249" font-size="16" fill="#103447">Agente autorizado</text><line x1="26" y1="276" x2="310" y2="276" stroke="#c4d2d6" opacity=".65"/><text x="26" y="290" font-size="14" font-weight="760" letter-spacing="1.2" fill="#528f2f">EL AGENTE</text><text x="26" y="315" font-size="16" fill="#103447">Invoca una capacidad</text><line x1="26" y1="342" x2="310" y2="342" stroke="#c4d2d6" opacity=".65"/><text x="26" y="356" font-size="14" font-weight="760" letter-spacing="1.2" fill="#528f2f">CAPACIDAD</text><text x="26" y="381" font-size="16" fill="#103447">WebMCP · API · MCP</text><line x1="26" y1="408" x2="310" y2="408" stroke="#c4d2d6" opacity=".65"/><text x="26" y="422" font-size="14" font-weight="760" letter-spacing="1.2" fill="#528f2f">CONTROL</text><text x="26" y="447" font-size="16" fill="#103447">Permiso + confirmación</text><line x1="26" y1="474" x2="310" y2="474" stroke="#c4d2d6" opacity=".65"/><text x="26" y="488" font-size="14" font-weight="760" letter-spacing="1.2" fill="#528f2f">SEÑAL</text><text x="26" y="513" font-size="16" fill="#103447">Tarea + auditoría</text>
      </g>
      <path d="M40 615H1392" stroke="#008f87" stroke-width="5" marker-end="url(#arrow)"/><text x="0" y="660" class="label" fill="#008f87">MENOS INFERENCIA · MÁS OPERABILIDAD · MÁS GOBIERNO</text>
      <text x="1428" y="706" text-anchor="end" font-size="23" font-weight="760" fill="#103447">La acción deja de ser un clic y se vuelve un contrato.</text>
    </g>
  </svg>