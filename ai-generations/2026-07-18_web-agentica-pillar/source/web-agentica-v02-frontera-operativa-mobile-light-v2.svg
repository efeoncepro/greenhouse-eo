<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="1600" viewBox="0 0 1200 1600" role="img" aria-labelledby="title desc">
  <title id="title">De una interfaz a un contrato operativo</title><desc id="desc">Cuatro tipos de sitio comparados por operador, comprensión del agente, capacidad, control y señal de éxito.</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%"><feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#00131d" flood-opacity=".12"/></filter>
    <marker id="arrow" markerWidth="11" markerHeight="11" refX="9" refY="5.5" orient="auto"><path d="M0 0L10 5.5L0 11Z" fill="#008f87"/></marker>
    <style>
      text{font-family:Poppins,Arial,sans-serif}.kicker{font-size:22px;font-weight:700;letter-spacing:3px;fill:#008f87}.title{font-weight:760;fill:#103447}.subtitle{font-size:23px;fill:#526b75}.label{font-size:20px;font-weight:700;letter-spacing:2px}.h{font-size:30px;font-weight:760;fill:#103447}.body{font-size:21px;fill:#526b75}.small{font-size:18px;fill:#526b75}
    </style>
  </defs>
  <rect width="1200" height="1600" fill="#ffffff"/>


    <text x="72" y="92" class="kicker">WEB AGÉNTICA · FRONTERA OPERATIVA</text>
    <image href="data:image/svg+xml;base64," x="960" y="58" width="168" height="45" preserveAspectRatio="xMidYMid meet"/>
    <text x="72" y="170" class="title" font-size="48">De una interfaz a un contrato operativo</text>
    <text x="72" y="220" class="subtitle">La diferencia no es “más IA”, sino cuánto debe inferir un agente para avanzar.</text>
    <g transform="translate(72 276)">
      <g data-containment="stage-mobile" transform="translate(0 0)">
        <rect width="1056" height="238" rx="24" fill="#ffffff" stroke="#c4d2d6" stroke-width="3"/><rect width="8" height="238" rx="4" fill="#c4d2d6"/>
        <circle cx="52" cy="48" r="23" fill="#c4d2d6"/><text x="52" y="55" text-anchor="middle" font-size="17" font-weight="800" fill="#fff">01</text><text x="88" y="44" font-size="18" font-weight="760" letter-spacing="1.6" fill="#c4d2d6">TRADICIONAL</text>
        <text x="32" y="93" class="h" style="font-size:27px">La persona navega</text><text x="1024" y="93" text-anchor="end" font-size="16" fill="#526b75">La interfaz es el producto</text><line x1="32" y1="116" x2="1024" y2="116" stroke="#c4d2d6"/>
        <text x="32" y="145" font-size="14" font-weight="760" letter-spacing="1.2" fill="#c4d2d6">EL AGENTE</text><text x="32" y="174" font-size="17" fill="#103447">Interpreta la pantalla</text><text x="550" y="145" font-size="14" font-weight="760" letter-spacing="1.2" fill="#c4d2d6">CAPACIDAD</text><text x="550" y="174" font-size="17" fill="#103447">Contenido + formularios</text>
        <text x="32" y="213" font-size="15" font-weight="650" fill="#103447">Control: Validación al enviar · Señal: Sesión + conversión</text>
      </g><g data-containment="stage-mobile" transform="translate(0 270)">
        <rect width="1056" height="238" rx="24" fill="#ffffff" stroke="#2277b7" stroke-width="3"/><rect width="8" height="238" rx="4" fill="#2277b7"/>
        <circle cx="52" cy="48" r="23" fill="#2277b7"/><text x="52" y="55" text-anchor="middle" font-size="17" font-weight="800" fill="#fff">02</text><text x="88" y="44" font-size="18" font-weight="760" letter-spacing="1.6" fill="#2277b7">CON IA</text>
        <text x="32" y="93" class="h" style="font-size:27px">La IA asiste dentro</text><text x="1024" y="93" text-anchor="end" font-size="16" fill="#526b75">La ayuda vive en el sitio</text><line x1="32" y1="116" x2="1024" y2="116" stroke="#c4d2d6"/>
        <text x="32" y="145" font-size="14" font-weight="760" letter-spacing="1.2" fill="#2277b7">EL AGENTE</text><text x="32" y="174" font-size="17" fill="#103447">Responde con contexto local</text><text x="550" y="145" font-size="14" font-weight="760" letter-spacing="1.2" fill="#2277b7">CAPACIDAD</text><text x="550" y="174" font-size="17" fill="#103447">Chat + personalización</text>
        <text x="32" y="213" font-size="15" font-weight="650" fill="#103447">Control: Handoff + consentimiento · Señal: Resolución + derivación</text>
      </g><g data-containment="stage-mobile" transform="translate(0 540)">
        <rect width="1056" height="238" rx="24" fill="#ffffff" stroke="#008f87" stroke-width="3"/><rect width="8" height="238" rx="4" fill="#008f87"/>
        <circle cx="52" cy="48" r="23" fill="#008f87"/><text x="52" y="55" text-anchor="middle" font-size="17" font-weight="800" fill="#fff">03</text><text x="88" y="44" font-size="18" font-weight="760" letter-spacing="1.6" fill="#008f87">PREPARADO</text>
        <text x="32" y="93" class="h" style="font-size:27px">El agente comprende</text><text x="1024" y="93" text-anchor="end" font-size="16" fill="#526b75">La tarea deja de ser ambigua</text><line x1="32" y1="116" x2="1024" y2="116" stroke="#c4d2d6"/>
        <text x="32" y="145" font-size="14" font-weight="760" letter-spacing="1.2" fill="#008f87">EL AGENTE</text><text x="32" y="174" font-size="17" fill="#103447">Descubre datos y tareas</text><text x="550" y="145" font-size="14" font-weight="760" letter-spacing="1.2" fill="#008f87">CAPACIDAD</text><text x="550" y="174" font-size="17" fill="#103447">Semántica + accesibilidad</text>
        <text x="32" y="213" font-size="15" font-weight="650" fill="#103447">Control: Entradas + errores explícitos · Señal: Descubrimiento + éxito</text>
      </g><g data-containment="stage-mobile" transform="translate(0 810)">
        <rect width="1056" height="238" rx="24" fill="#f3f5f6" stroke="#528f2f" stroke-width="3"/><rect width="8" height="238" rx="4" fill="#528f2f"/>
        <circle cx="52" cy="48" r="23" fill="#528f2f"/><text x="52" y="55" text-anchor="middle" font-size="17" font-weight="800" fill="#fff">04</text><text x="88" y="44" font-size="18" font-weight="760" letter-spacing="1.6" fill="#528f2f">AGÉNTICO</text>
        <text x="32" y="93" class="h" style="font-size:27px">El agente opera</text><text x="1024" y="93" text-anchor="end" font-size="16" fill="#526b75">La acción tiene contrato</text><line x1="32" y1="116" x2="1024" y2="116" stroke="#c4d2d6"/>
        <text x="32" y="145" font-size="14" font-weight="760" letter-spacing="1.2" fill="#528f2f">EL AGENTE</text><text x="32" y="174" font-size="17" fill="#103447">Invoca una capacidad</text><text x="550" y="145" font-size="14" font-weight="760" letter-spacing="1.2" fill="#528f2f">CAPACIDAD</text><text x="550" y="174" font-size="17" fill="#103447">WebMCP · API · MCP</text>
        <text x="32" y="213" font-size="15" font-weight="650" fill="#103447">Control: Permiso + confirmación · Señal: Tarea + auditoría</text>
      </g>
      <path d="M0 1102H1018" stroke="#008f87" stroke-width="5" marker-end="url(#arrow)"/><text x="0" y="1148" class="label" fill="#008f87">MENOS INFERENCIA · MÁS GOBIERNO →</text><text x="0" y="1195" font-size="25" font-weight="760" fill="#103447">La acción deja de ser un clic y se vuelve un contrato.</text>
    </g>
  </svg>