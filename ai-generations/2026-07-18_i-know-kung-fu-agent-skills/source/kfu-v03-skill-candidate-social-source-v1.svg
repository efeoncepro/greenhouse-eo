<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350" role="img" aria-labelledby="title desc">
  <title id="title">¿Este proceso merece convertirse en un skill?</title>
  <desc id="desc">Cinco señales para decidir si un proceso es buen candidato para un Agent Skill propietario.</desc>
  <metadata>Editable source SVG · Efeonce editorial infographic system · 2026-07-18</metadata>
  <rect width="1080" height="1350" fill="#FFFFFF"/>
  <g font-family="Poppins, Arial, Helvetica, sans-serif">

  <text x="64" y="68" font-size="18" font-weight="700" letter-spacing="3" fill="#0375DB">AGENT SKILLS · GUÍA DE DECISIÓN</text>
  <text x="64" y="140" text-anchor="start" font-size="48" font-weight="700" fill="#022A4E"><tspan x="64" dy="0">¿Este proceso merece</tspan><tspan x="64" dy="56">convertirse en un skill?</tspan></text>
  <text x="64" y="282" text-anchor="start" font-size="22" font-weight="400" fill="#505964"><tspan x="64" dy="0">Busca señales de criterio operativo, no sólo</tspan><tspan x="64" dy="30">una secuencia de pasos que automatizar.</tspan></text>
  <path d="M178 390 V1010" stroke="#DBDBDB" stroke-width="8" stroke-linecap="round"/>
  
  <circle cx="178" cy="410" r="47" fill="#0375DB"/>
  <text x="178" y="419" text-anchor="middle" font-size="27" font-weight="700" fill="#FFFFFF">1</text>
  <line x1="226" y1="410" x2="282" y2="410" stroke="#DBDBDB" stroke-width="4"/>
  <text x="310" y="403" font-size="25" font-weight="700" fill="#022A4E">SE REPITE</text>
  <text x="310" y="436" font-size="19" fill="#505964">Ocurre con suficiente frecuencia para mantenerlo.</text>
  
  <circle cx="178" cy="550" r="47" fill="#0375DB"/>
  <text x="178" y="559" text-anchor="middle" font-size="27" font-weight="700" fill="#FFFFFF">2</text>
  <line x1="226" y1="550" x2="282" y2="550" stroke="#DBDBDB" stroke-width="4"/>
  <text x="310" y="543" font-size="25" font-weight="700" fill="#022A4E">DEPENDE DE CRITERIO</text>
  <text x="310" y="576" font-size="19" fill="#505964">Exige decidir, priorizar o reconocer calidad.</text>
  
  <circle cx="178" cy="690" r="47" fill="#0375DB"/>
  <text x="178" y="699" text-anchor="middle" font-size="27" font-weight="700" fill="#FFFFFF">3</text>
  <line x1="226" y1="690" x2="282" y2="690" stroke="#DBDBDB" stroke-width="4"/>
  <text x="310" y="683" font-size="25" font-weight="700" fill="#022A4E">TIENE EXCEPCIONES</text>
  <text x="310" y="716" font-size="19" fill="#505964">Incluye límites y casos que un prompt genérico pierde.</text>
  
  <circle cx="178" cy="830" r="47" fill="#0375DB"/>
  <text x="178" y="839" text-anchor="middle" font-size="27" font-weight="700" fill="#FFFFFF">4</text>
  <line x1="226" y1="830" x2="282" y2="830" stroke="#DBDBDB" stroke-width="4"/>
  <text x="310" y="823" font-size="25" font-weight="700" fill="#022A4E">SE PUEDE VERIFICAR</text>
  <text x="310" y="856" font-size="19" fill="#505964">Produce evidencia y condiciones claras de aceptación.</text>
  
  <circle cx="178" cy="970" r="47" fill="#F55D01"/>
  <text x="178" y="979" text-anchor="middle" font-size="27" font-weight="700" fill="#FFFFFF">5</text>
  <line x1="226" y1="970" x2="282" y2="970" stroke="#DBDBDB" stroke-width="4"/>
  <text x="310" y="963" font-size="25" font-weight="700" fill="#022A4E">TIENE UN DUEÑO</text>
  <text x="310" y="996" font-size="19" fill="#505964">Alguien revisa el skill cuando cambia la operación.</text>
  <rect x="92" y="1060" width="896" height="158" rx="32" fill="#022A4E"/>
  <text x="132" y="1108" font-size="17" font-weight="700" letter-spacing="3" fill="#9FD4FF">DECISIÓN</text>
  <text x="132" y="1156" font-size="30" font-weight="700" fill="#FFFFFF">Cuantas más señales reúna,</text>
  <text x="132" y="1194" font-size="29" font-weight="700" fill="#FFFFFF">mejor candidato es para prototipar y probar.</text>

  <line x1="72" y1="1258" x2="1008" y2="1258" stroke="#DBDBDB" stroke-width="2"/>
  <text x="72" y="1302" font-size="17" fill="#505964">Marco editorial Efeonce · No es una fórmula universal</text>
  <image x="804" y="1274" width="204" height="40" href="data:image/svg+xml;base64,"/>
  </g>
</svg>
