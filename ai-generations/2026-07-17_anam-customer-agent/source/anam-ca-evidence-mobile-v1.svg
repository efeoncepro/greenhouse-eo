      <text x="125" y="400" font-family="Poppins, Arial, sans-serif" font-size="18" font-weight="650" fill="#214BD9" >01</text><text x="210" y="423" font-family="Poppins, Arial, sans-serif" font-size="34" font-weight="650" fill="#072A4A" >Documentado</text>
      <text x="600" y="403" font-family="Poppins, Arial, sans-serif" font-size="18" font-weight="400" fill="#171918" ><tspan x="600" dy="0">El proveedor describe</tspan><tspan x="600" dy="25.2">la capacidad.</tspan></text>

      <g filter="url(#softShadow)"><rect x="80" y="565" width="1040" height="175" rx="24" fill="#E7EDF9" stroke="#214BD9" stroke-width="2" /></g>
      <text x="125" y="620" font-family="Poppins, Arial, sans-serif" font-size="18" font-weight="650" fill="#214BD9" >02</text><text x="210" y="643" font-family="Poppins, Arial, sans-serif" font-size="34" font-weight="650" fill="#072A4A" >Elegible</text>
      <text x="600" y="623" font-family="Poppins, Arial, sans-serif" font-size="18" font-weight="400" fill="#171918" ><tspan x="600" dy="0">La cuenta muestra</tspan><tspan x="600" dy="25.2">la superficie.</tspan></text>

      <g filter="url(#softShadow)"><rect x="80" y="785" width="1040" height="175" rx="24" fill="#E7EDF9" stroke="#214BD9" stroke-width="2" /></g>
      <text x="125" y="840" font-family="Poppins, Arial, sans-serif" font-size="18" font-weight="650" fill="#214BD9" >03</text><text x="210" y="863" font-family="Poppins, Arial, sans-serif" font-size="34" font-weight="650" fill="#072A4A" >Configurado</text>
      <text x="600" y="843" font-family="Poppins, Arial, sans-serif" font-size="18" font-weight="400" fill="#171918" ><tspan x="600" dy="0">Fuentes, directrices</tspan><tspan x="600" dy="25.2">y canal presentes.</tspan></text>

      <g filter="url(#softShadow)"><rect x="80" y="1005" width="1040" height="175" rx="24" fill="#FFE1D6" stroke="#F15E4A" stroke-width="4" /></g>
      <text x="125" y="1060" font-family="Poppins, Arial, sans-serif" font-size="18" font-weight="650" fill="#F15E4A" >04</text><text x="210" y="1083" font-family="Poppins, Arial, sans-serif" font-size="34" font-weight="650" fill="#072A4A" >Probado</text>
      <text x="600" y="1063" font-family="Poppins, Arial, sans-serif" font-size="18" font-weight="400" fill="#171918" ><tspan x="600" dy="0">Vista previa con</tspan><tspan x="600" dy="25.2">limitaciones.</tspan></text>
      <rect x="820" y="1110" width="245" height="42" rx="21" fill="#F15E4A"/><text x="942.5" y="1138" font-family="Poppins, Arial, sans-serif" font-size="15" font-weight="600" fill="#FFFFFF" text-anchor="middle" letter-spacing="1.2">ANAM AL CORTE</text>
      <g filter="url(#softShadow)"><rect x="80" y="1225" width="1040" height="175" rx="24" fill="#FFFFFF" stroke="#9A9D99" stroke-width="2" stroke-dasharray="12 10"/></g>
      <text x="125" y="1280" font-family="Poppins, Arial, sans-serif" font-size="18" font-weight="650" fill="#9A9D99" >05</text><text x="210" y="1303" font-family="Poppins, Arial, sans-serif" font-size="34" font-weight="650" fill="#5E625F" >Operativo</text>
      <text x="600" y="1283" font-family="Poppins, Arial, sans-serif" font-size="18" font-weight="400" fill="#5E625F" ><tspan x="600" dy="0">Conversación real</tspan><tspan x="600" dy="25.2">verificada.</tspan></text>

      <text x="1060" y="1343" font-family="Poppins, Arial, sans-serif" font-size="15" font-weight="650" fill="#5E625F" text-anchor="end" letter-spacing="1">NO VERIFICADO</text>
    <text x="80" y="1535" font-family="Poppins, Arial, sans-serif" font-size="18" font-weight="500" fill="#5E625F" >Corte: 17 de julio de 2026 · conversaciones nuevas en pausa</text>

