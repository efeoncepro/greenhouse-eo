<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="1600" viewBox="0 0 1200 1600" role="img" aria-labelledby="title desc">
  <title id="title">Arquitectura gobernada de las 23 fuentes</title><desc id="desc">Seis archivos y diecisiete respuestas cortas pasan por reglas de gobierno antes de orientar, aclarar o transferir una consulta.</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%"><feDropShadow dx="0" dy="16" stdDeviation="14" flood-color="#101010" flood-opacity=".14"/></filter>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="160%"><feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#101010" flood-opacity=".10"/></filter>

  </defs>


    <rect x="80" y="70" width="265" height="42" rx="21" fill="#214BD9"/><text x="212.5" y="98" font-family="Poppins, Arial, sans-serif" font-size="15" font-weight="600" fill="#FFFFFF" text-anchor="middle" letter-spacing="1.2">23 FUENTES · UN CONTRATO</text>
    <text x="80" y="165" font-family="Poppins, Arial, sans-serif" font-size="50" font-weight="650" fill="#171918" ><tspan x="80" dy="0">Cargar documentos</tspan><tspan x="80" dy="56.00000000000001">no crea conocimiento</tspan></text>
    <text x="80" y="300" font-family="Poppins, Arial, sans-serif" font-size="20" font-weight="400" fill="#5E625F" >El valor aparece cuando cada fuente tiene propósito, vigencia y responsable.</text>

    <g filter="url(#softShadow)"><rect x="80" y="350" width="1040" height="310" rx="26" fill="#E7EDF9"/></g>
    <text x="125" y="410" font-family="Poppins, Arial, sans-serif" font-size="16" font-weight="650" fill="#214BD9" letter-spacing="1.5">FUENTES EN USO</text>
    <text x="125" y="505" font-family="Poppins, Arial, sans-serif" font-size="72" font-weight="700" fill="#072A4A" >6</text><text x="220" y="486" font-family="Poppins, Arial, sans-serif" font-size="23" font-weight="600" fill="#072A4A" >archivos privados</text>
    <text x="570" y="505" font-family="Poppins, Arial, sans-serif" font-size="72" font-weight="700" fill="#F15E4A" >+ 17</text><text x="760" y="486" font-family="Poppins, Arial, sans-serif" font-size="23" font-weight="600" fill="#6A2418" >respuestas cortas</text>
    <text x="125" y="595" font-family="Poppins, Arial, sans-serif" font-size="18" font-weight="500" fill="#5E625F" >El catálogo contiene 356 registros técnicos; no son 356 fuentes ni servicios.</text>

    <path d="M600 680 L600 716" stroke="#214BD9" stroke-width="4" stroke-linecap="round"/><path d="M591 714 L600 730 L609 714" fill="none" stroke="#214BD9" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    <g filter="url(#softShadow)"><rect data-role="deep-surface" x="80" y="750" width="1040" height="300" rx="26" fill="#072A4A"/></g>
    <text x="125" y="815" font-family="Poppins, Arial, sans-serif" font-size="18" font-weight="650" fill="#87C1F2" letter-spacing="1.4">GOBIERNO DEL CONOCIMIENTO</text>
    <text x="125" y="900" font-family="Poppins, Arial, sans-serif" font-size="27" font-weight="650" fill="#FFFFFF" >Propósito</text><text x="585" y="900" font-family="Poppins, Arial, sans-serif" font-size="27" font-weight="650" fill="#FFFFFF" >Vigencia</text>
    <text x="125" y="980" font-family="Poppins, Arial, sans-serif" font-size="27" font-weight="650" fill="#FFFFFF" >Responsable</text><text x="585" y="980" font-family="Poppins, Arial, sans-serif" font-size="27" font-weight="650" fill="#FFFFFF" >Contradicciones</text>

    <path d="M600 1070 L600 1106" stroke="#F15E4A" stroke-width="4" stroke-linecap="round"/><path d="M591 1104 L600 1120 L609 1104" fill="none" stroke="#F15E4A" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    <g filter="url(#softShadow)"><rect x="80" y="1140" width="1040" height="300" rx="26" fill="#FFE1D6"/></g>
    <text x="125" y="1205" font-family="Poppins, Arial, sans-serif" font-size="18" font-weight="650" fill="#A03928" letter-spacing="1.4">CONDUCTA DEL AGENTE</text>
    <rect x="125" y="1260" width="250" height="42" rx="21" fill="#214BD9"/><text x="250" y="1288" font-family="Poppins, Arial, sans-serif" font-size="15" font-weight="600" fill="#FFFFFF" text-anchor="middle" letter-spacing="1.2">RESPONDER</text><rect x="475" y="1260" width="250" height="42" rx="21" fill="#FF8A4C"/><text x="600" y="1288" font-family="Poppins, Arial, sans-serif" font-size="15" font-weight="600" fill="#FFFFFF" text-anchor="middle" letter-spacing="1.2">ACLARAR</text><rect x="825" y="1260" width="250" height="42" rx="21" fill="#111614"/><text x="950" y="1288" font-family="Poppins, Arial, sans-serif" font-size="15" font-weight="600" fill="#FFFFFF" text-anchor="middle" letter-spacing="1.2">TRANSFERIR</text>
    <text x="125" y="1385" font-family="Poppins, Arial, sans-serif" font-size="18" font-weight="500" fill="#6A2418" >Las fuentes no llegan directo a una respuesta: primero pasan por reglas.</text>


  <!-- Official Efeonce wordmark is composited deterministically during rasterization. -->
