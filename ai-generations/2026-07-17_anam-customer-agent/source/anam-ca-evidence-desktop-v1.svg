      <text x="1304" y="443" font-family="Poppins, Arial, sans-serif" font-size="16" font-weight="400" fill="#5E625F" ><tspan x="1304" dy="0">Conversación real</tspan><tspan x="1304" dy="23.2">verificada.</tspan></text>

      <text x="1304" y="703" font-family="Poppins, Arial, sans-serif" font-size="14" font-weight="650" fill="#5E625F" letter-spacing="1">NO VERIFICADO</text>
