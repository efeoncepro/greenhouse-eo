<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000" role="img" aria-labelledby="title desc">
  <title id="title">Escalera de evidencia operativa</title><desc id="desc">ANAM alcanzó configuración y prueba en vista previa, pero no verificación en operación real al corte.</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%"><feDropShadow dx="0" dy="16" stdDeviation="14" flood-color="#101010" flood-opacity=".14"/></filter>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="160%"><feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#101010" flood-opacity=".10"/></filter>

  </defs>


    <rect x="80" y="70" width="250" height="42" rx="21" fill="#214BD9"/><text x="205" y="98" font-family="Poppins, Arial, sans-serif" font-size="15" font-weight="600" fill="#FFFFFF" text-anchor="middle" letter-spacing="1.2">ESCALERA DE EVIDENCIA</text>
    <text x="80" y="165" font-family="Poppins, Arial, sans-serif" font-size="54" font-weight="650" fill="#171918" ><tspan x="80" dy="0">Configurar no es operar</tspan></text>
    <text x="80" y="255" font-family="Poppins, Arial, sans-serif" font-size="22" font-weight="400" fill="#5E625F" >Cada estado exige una evidencia distinta.</text>
    <g filter="url(#softShadow)"><rect x="70" y="365" width="260" height="390" rx="24" fill="#E7EDF9" stroke="#214BD9" stroke-width="2" /></g>
      <text x="96" y="420" font-family="Poppins, Arial, sans-serif" font-size="18" font-weight="650" fill="#214BD9" >01</text><text x="96" y="495" font-family="Poppins, Arial, sans-serif" font-size="28" font-weight="650" fill="#072A4A" >Documentado</text>
      <text x="96" y="555" font-family="Poppins, Arial, sans-serif" font-size="16" font-weight="400" fill="#171918" ><tspan x="96" dy="0">El proveedor describe</tspan><tspan x="96" dy="23.2">la capacidad.</tspan></text>

      <g filter="url(#softShadow)"><rect x="372" y="337" width="260" height="418" rx="24" fill="#E7EDF9" stroke="#214BD9" stroke-width="2" /></g>
      <text x="398" y="392" font-family="Poppins, Arial, sans-serif" font-size="18" font-weight="650" fill="#214BD9" >02</text><text x="398" y="467" font-family="Poppins, Arial, sans-serif" font-size="28" font-weight="650" fill="#072A4A" >Elegible</text>
      <text x="398" y="527" font-family="Poppins, Arial, sans-serif" font-size="16" font-weight="400" fill="#171918" ><tspan x="398" dy="0">La cuenta muestra</tspan><tspan x="398" dy="23.2">la superficie.</tspan></text>

      <g filter="url(#softShadow)"><rect x="674" y="309" width="260" height="446" rx="24" fill="#E7EDF9" stroke="#214BD9" stroke-width="2" /></g>
      <text x="700" y="364" font-family="Poppins, Arial, sans-serif" font-size="18" font-weight="650" fill="#214BD9" >03</text><text x="700" y="439" font-family="Poppins, Arial, sans-serif" font-size="28" font-weight="650" fill="#072A4A" >Configurado</text>
      <text x="700" y="499" font-family="Poppins, Arial, sans-serif" font-size="16" font-weight="400" fill="#171918" ><tspan x="700" dy="0">Fuentes, directrices</tspan><tspan x="700" dy="23.2">y canal presentes.</tspan></text>

      <g filter="url(#softShadow)"><rect x="976" y="281" width="260" height="474" rx="24" fill="#FFE1D6" stroke="#F15E4A" stroke-width="4" /></g>
      <text x="1002" y="336" font-family="Poppins, Arial, sans-serif" font-size="18" font-weight="650" fill="#F15E4A" >04</text><text x="1002" y="411" font-family="Poppins, Arial, sans-serif" font-size="28" font-weight="650" fill="#072A4A" >Probado</text>
      <text x="1002" y="471" font-family="Poppins, Arial, sans-serif" font-size="16" font-weight="400" fill="#171918" ><tspan x="1002" dy="0">Vista previa con</tspan><tspan x="1002" dy="23.2">limitaciones.</tspan></text>
      <rect x="1002" y="675" width="205" height="42" rx="21" fill="#F15E4A"/><text x="1104.5" y="703" font-family="Poppins, Arial, sans-serif" font-size="15" font-weight="600" fill="#FFFFFF" text-anchor="middle" letter-spacing="1.2">ANAM AL CORTE</text>
      <g filter="url(#softShadow)"><rect x="1278" y="253" width="260" height="502" rx="24" fill="#FFFFFF" stroke="#9A9D99" stroke-width="2" stroke-dasharray="12 10"/></g>
