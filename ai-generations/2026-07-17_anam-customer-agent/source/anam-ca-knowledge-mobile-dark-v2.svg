<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="1600" viewBox="0 0 1200 1600" role="img" aria-labelledby="title desc">
  <title id="title">Arquitectura gobernada de las 23 fuentes</title><desc id="desc">Seis archivos y diecisiete respuestas cortas pasan por reglas de gobierno antes de orientar, aclarar o transferir una consulta.</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%"><feDropShadow dx="0" dy="16" stdDeviation="14" flood-color="#101010" flood-opacity=".14"/></filter>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="160%"><feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#101010" flood-opacity=".10"/></filter>

  </defs>


    <rect x="80" y="70" width="295" height="42" rx="21" fill="#214BD9"/><text x="227.5" y="98" font-family="Poppins, Arial, sans-serif" font-size="15" font-weight="600" fill="#FFFFFF" text-anchor="middle" letter-spacing="1.2">23 FUENTES · 4 CONTROLES</text>
    <text x="80" y="165" font-family="Poppins, Arial, sans-serif" font-size="50" font-weight="650" fill="#F7F8FA" ><tspan x="80" dy="0">De archivos a un</tspan><tspan x="80" dy="56.00000000000001">contrato de respuesta</tspan></text>
    <text x="80" y="300" font-family="Poppins, Arial, sans-serif" font-size="19" font-weight="400" fill="#BEC6CE" >El volumen no gobierna la respuesta: la gobiernan propósito, vigencia y responsabilidad.</text>

    <g filter="url(#softShadow)"><rect x="80" y="350" width="1040" height="335" rx="26" fill="#17283C"/></g>
    <text x="125" y="410" font-family="Poppins, Arial, sans-serif" font-size="16" font-weight="650" fill="#214BD9" letter-spacing="1.5">FUENTES EN USO</text>
    <text x="125" y="500" font-family="Poppins, Arial, sans-serif" font-size="68" font-weight="700" fill="#F7F8FA" >6</text><text x="215" y="480" font-family="Poppins, Arial, sans-serif" font-size="22" font-weight="600" fill="#F7F8FA" >archivos privados</text>
    <text x="570" y="500" font-family="Poppins, Arial, sans-serif" font-size="68" font-weight="700" fill="#F15E4A" >+ 17</text><text x="755" y="480" font-family="Poppins, Arial, sans-serif" font-size="22" font-weight="600" fill="#FFC0B2" >respuestas cortas</text>
    <text x="125" y="565" font-family="Poppins, Arial, sans-serif" font-size="18" font-weight="500" fill="#F7F8FA" ><tspan x="125" dy="0">Empresa · servicios y normas · FAQ</tspan><tspan x="125" dy="26.099999999999998">Cotización · seguimiento/calidad · catálogo</tspan></text>
    <text x="570" y="585" font-family="Poppins, Arial, sans-serif" font-size="18" font-weight="500" fill="#FFC0B2" >Situaciones críticas y formulaciones recurrentes.</text>
    <text x="125" y="650" font-family="Poppins, Arial, sans-serif" font-size="17" font-weight="500" fill="#BEC6CE" >356 registros viven dentro del catálogo: describen referencias, no disponibilidad.</text>

    <path d="M600 705 L600 736" stroke="#214BD9" stroke-width="4" stroke-linecap="round"/><path d="M591 734 L600 750 L609 734" fill="none" stroke="#214BD9" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    <g filter="url(#softShadow)"><rect data-role="deep-surface" x="80" y="770" width="1040" height="310" rx="26" fill="#082D50"/></g>
    <text x="125" y="815" font-family="Poppins, Arial, sans-serif" font-size="18" font-weight="650" fill="#87C1F2" letter-spacing="1.4">GOBIERNO DEL CONOCIMIENTO</text>
    <text x="125" y="895" font-family="Poppins, Arial, sans-serif" font-size="24" font-weight="650" fill="#FFFFFF" >¿Para qué decisión sirve?</text><text x="650" y="895" font-family="Poppins, Arial, sans-serif" font-size="24" font-weight="650" fill="#FFFFFF" >¿Sigue vigente?</text>
    <text x="125" y="965" font-family="Poppins, Arial, sans-serif" font-size="24" font-weight="650" fill="#FFFFFF" >¿Quién responde por ella?</text><text x="650" y="965" font-family="Poppins, Arial, sans-serif" font-size="24" font-weight="650" fill="#FFFFFF" >¿Qué ocurre si contradice?</text>
    <text x="125" y="1035" font-family="Poppins, Arial, sans-serif" font-size="17" font-weight="500" fill="#BBD8F0" >La fuente se vuelve utilizable sólo cuando supera estos cuatro controles.</text>

    <path d="M600 1100 L600 1126" stroke="#F15E4A" stroke-width="4" stroke-linecap="round"/><path d="M591 1124 L600 1140 L609 1124" fill="none" stroke="#F15E4A" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    <g filter="url(#softShadow)"><rect x="80" y="1160" width="1040" height="300" rx="26" fill="#3A211E"/></g>
    <text x="125" y="1215" font-family="Poppins, Arial, sans-serif" font-size="18" font-weight="650" fill="#FF9A87" letter-spacing="1.4">CONTRATO DE RESPUESTA</text>
    <rect x="125" y="1260" width="250" height="42" rx="21" fill="#214BD9"/><text x="250" y="1288" font-family="Poppins, Arial, sans-serif" font-size="15" font-weight="600" fill="#FFFFFF" text-anchor="middle" letter-spacing="1.2">RESPONDER</text><rect x="475" y="1260" width="250" height="42" rx="21" fill="#FF8A4C"/><text x="600" y="1288" font-family="Poppins, Arial, sans-serif" font-size="15" font-weight="600" fill="#FFFFFF" text-anchor="middle" letter-spacing="1.2">PREGUNTAR</text><rect x="825" y="1260" width="250" height="42" rx="21" fill="#2A2D2C"/><text x="950" y="1288" font-family="Poppins, Arial, sans-serif" font-size="15" font-weight="600" fill="#FFFFFF" text-anchor="middle" letter-spacing="1.2">TRANSFERIR</text>
    <text x="125" y="1350" font-family="Poppins, Arial, sans-serif" font-size="18" font-weight="650" fill="#F7F8FA" >Documentado</text><text x="475" y="1350" font-family="Poppins, Arial, sans-serif" font-size="18" font-weight="650" fill="#FFC0B2" >Falta contexto</text><text x="825" y="1350" font-family="Poppins, Arial, sans-serif" font-size="18" font-weight="650" fill="#F7F8FA" >Cambia la responsabilidad</text>
    <text x="125" y="1410" font-family="Poppins, Arial, sans-serif" font-size="18" font-weight="600" fill="#FFC0B2" >Nunca convertir un registro técnico en disponibilidad o promesa.</text>


