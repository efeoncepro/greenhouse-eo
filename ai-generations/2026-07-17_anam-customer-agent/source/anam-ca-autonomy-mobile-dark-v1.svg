<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="1600" viewBox="0 0 1200 1600" role="img" aria-labelledby="title desc">
  <title id="title">Frontera de autonomía conversacional</title><desc id="desc">Cuatro zonas muestran qué puede responder, aclarar y preparar el agente, y qué debe decidir una persona.</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%"><feDropShadow dx="0" dy="16" stdDeviation="14" flood-color="#101010" flood-opacity=".14"/></filter>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="160%"><feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#101010" flood-opacity=".10"/></filter>

  </defs>


    <rect x="80" y="70" width="235" height="42" rx="21" fill="#214BD9"/><text x="197.5" y="98" font-family="Poppins, Arial, sans-serif" font-size="15" font-weight="600" fill="#FFFFFF" text-anchor="middle" letter-spacing="1.2">AUTONOMÍA CONVERSACIONAL</text>
    <text x="80" y="165" font-family="Poppins, Arial, sans-serif" font-size="52" font-weight="650" fill="#F7F8FA" ><tspan x="80" dy="0">La responsabilidad</tspan><tspan x="80" dy="58.24000000000001">marca la frontera</tspan></text>
    <text x="80" y="300" font-family="Poppins, Arial, sans-serif" font-size="21" font-weight="400" fill="#BEC6CE" >No todas las conversaciones recorren las cuatro zonas.</text>
    <g filter="url(#softShadow)"><rect x="80" y="355" width="1040" height="225" rx="24" fill="#214BD9"/></g>
      <text x="120" y="405" font-family="Poppins, Arial, sans-serif" font-size="18" font-weight="650" fill="#A8E72E" >01</text>
      <text x="120" y="467" font-family="Poppins, Arial, sans-serif" font-size="40" font-weight="650" fill="#FFFFFF" >Saber</text>
      <text x="420" y="431" font-family="Poppins, Arial, sans-serif" font-size="20" font-weight="400" fill="#FFFFFF" ><tspan x="420" dy="0">Respuesta documentada.</tspan><tspan x="420" dy="29">No implica decisión sensible.</tspan></text>
      <text x="1080" y="531" font-family="Poppins, Arial, sans-serif" font-size="15" font-weight="650" fill="#A8E72E" text-anchor="end" letter-spacing="1">AGENTE</text><g filter="url(#softShadow)"><rect x="80" y="625" width="1040" height="225" rx="24" fill="#17283C"/></g>
      <text x="120" y="675" font-family="Poppins, Arial, sans-serif" font-size="18" font-weight="650" fill="#214BD9" >02</text>
      <text x="120" y="737" font-family="Poppins, Arial, sans-serif" font-size="40" font-weight="650" fill="#F7F8FA" >Aclarar</text>
      <text x="420" y="701" font-family="Poppins, Arial, sans-serif" font-size="20" font-weight="400" fill="#F7F8FA" ><tspan x="420" dy="0">Existe conocimiento.</tspan><tspan x="420" dy="29">Faltan antecedentes.</tspan></text>
      <text x="1080" y="801" font-family="Poppins, Arial, sans-serif" font-size="15" font-weight="650" fill="#214BD9" text-anchor="end" letter-spacing="1">AGENTE</text><g filter="url(#softShadow)"><rect x="80" y="895" width="1040" height="225" rx="24" fill="#3A211E"/></g>
      <text x="120" y="945" font-family="Poppins, Arial, sans-serif" font-size="18" font-weight="650" fill="#FF8A4C" >03</text>
      <text x="120" y="1007" font-family="Poppins, Arial, sans-serif" font-size="40" font-weight="650" fill="#FFC0B2" >Preparar</text>
      <text x="420" y="971" font-family="Poppins, Arial, sans-serif" font-size="20" font-weight="400" fill="#FFC0B2" ><tspan x="420" dy="0">La acción será humana.</tspan><tspan x="420" dy="29">El agente reúne y resume.</tspan></text>
      <text x="1080" y="1071" font-family="Poppins, Arial, sans-serif" font-size="15" font-weight="650" fill="#FF8A4C" text-anchor="end" letter-spacing="1">AGENTE → PERSONA</text><g filter="url(#softShadow)"><rect x="80" y="1165" width="1040" height="225" rx="24" fill="#2A2D2C"/></g>
      <text x="120" y="1215" font-family="Poppins, Arial, sans-serif" font-size="18" font-weight="650" fill="#F15E4A" >04</text>
      <text x="120" y="1277" font-family="Poppins, Arial, sans-serif" font-size="40" font-weight="650" fill="#FFFFFF" >Decidir</text>
      <text x="420" y="1241" font-family="Poppins, Arial, sans-serif" font-size="20" font-weight="400" fill="#FFFFFF" ><tspan x="420" dy="0">Requiere juicio, acceso</tspan><tspan x="420" dy="29">o compromiso organizacional.</tspan></text>
      <text x="1080" y="1341" font-family="Poppins, Arial, sans-serif" font-size="15" font-weight="650" fill="#F15E4A" text-anchor="end" letter-spacing="1">PERSONA</text>
    <line x1="80" y1="1142" x2="1120" y2="1142" stroke="#F15E4A" stroke-width="4" stroke-dasharray="10 10" opacity=".45"/>
    <text x="80" y="1525" font-family="Poppins, Arial, sans-serif" font-size="24" font-weight="600" fill="#F7F8FA" >La IA se detiene antes de decidir por la organización.</text>

  <!-- Official Efeonce wordmark is composited deterministically during rasterization. -->
</svg>