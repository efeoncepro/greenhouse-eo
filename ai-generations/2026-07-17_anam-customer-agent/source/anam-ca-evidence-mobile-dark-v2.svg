    <rect x="80" y="70" width="270" height="42" rx="21" fill="#214BD9"/><text x="215" y="98" font-family="Poppins, Arial, sans-serif" font-size="15" font-weight="600" fill="#FFFFFF" text-anchor="middle" letter-spacing="1.2">CADENA DE EVIDENCIA</text>
    <text x="80" y="165" font-family="Poppins, Arial, sans-serif" font-size="48" font-weight="650" fill="#F7F8FA" ><tspan x="80" dy="0">Lo que falta probar</tspan><tspan x="80" dy="53.760000000000005">también es un resultado</tspan></text>
    <text x="80" y="300" font-family="Poppins, Arial, sans-serif" font-size="19" font-weight="400" fill="#BEC6CE" >La configuración y la vista previa no sustituyen una conversación nueva en operación real.</text>

