    <text x="125" y="835" font-family="Poppins, Arial, sans-serif" font-size="62" font-weight="700" fill="#FFC0B2" >39</text><text x="240" y="815" font-family="Poppins, Arial, sans-serif" font-size="20" font-weight="600" fill="#FFC0B2" >escenarios diseñados</text>
    <text x="555" y="835" font-family="Poppins, Arial, sans-serif" font-size="52" font-weight="700" fill="#FFC0B2" >≥24</text><text x="685" y="815" font-family="Poppins, Arial, sans-serif" font-size="20" font-weight="600" fill="#FFC0B2" >recuperables</text>
