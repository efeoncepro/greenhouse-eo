    <text x="125" y="475" font-family="Poppins, Arial, sans-serif" font-size="22" font-weight="550" fill="#F7F8FA" ><tspan x="125" dy="0">Documentación + superficie elegible</tspan><tspan x="125" dy="33">23 fuentes, directrices, canal y handoff</tspan></text>
