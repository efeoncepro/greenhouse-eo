<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000" role="img" aria-labelledby="title desc">
  <title id="title">Arquitectura gobernada de las 23 fuentes</title><desc id="desc">Seis archivos y diecisiete respuestas cortas pasan por reglas de gobierno antes de orientar, aclarar o transferir una consulta.</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%"><feDropShadow dx="0" dy="16" stdDeviation="14" flood-color="#101010" flood-opacity=".14"/></filter>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="160%"><feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#101010" flood-opacity=".10"/></filter>

  </defs>


    <rect x="80" y="70" width="265" height="42" rx="21" fill="#214BD9"/><text x="212.5" y="98" font-family="Poppins, Arial, sans-serif" font-size="15" font-weight="600" fill="#FFFFFF" text-anchor="middle" letter-spacing="1.2">23 FUENTES · UN CONTRATO</text>
    <text x="80" y="165" font-family="Poppins, Arial, sans-serif" font-size="52" font-weight="650" fill="#171918" ><tspan x="80" dy="0">Cargar documentos no crea conocimiento</tspan></text>
    <text x="80" y="255" font-family="Poppins, Arial, sans-serif" font-size="21" font-weight="400" fill="#5E625F" >El valor aparece cuando cada fuente tiene propósito, vigencia y responsable.</text>

    <g filter="url(#softShadow)"><rect x="80" y="345" width="410" height="420" rx="26" fill="#E7EDF9"/></g>
    <text x="120" y="405" font-family="Poppins, Arial, sans-serif" font-size="16" font-weight="650" fill="#214BD9" letter-spacing="1.5">FUENTES EN USO</text>
    <text x="120" y="510" font-family="Poppins, Arial, sans-serif" font-size="76" font-weight="700" fill="#072A4A" >6</text><text x="220" y="486" font-family="Poppins, Arial, sans-serif" font-size="25" font-weight="600" fill="#072A4A" >archivos</text>
    <text x="120" y="625" font-family="Poppins, Arial, sans-serif" font-size="76" font-weight="700" fill="#F15E4A" >17</text><text x="250" y="600" font-family="Poppins, Arial, sans-serif" font-size="23" font-weight="600" fill="#6A2418" >respuestas cortas</text>
    <line x1="120" y1="665" x2="450" y2="665" stroke="#B9C8D8"/>
    <text x="120" y="710" font-family="Poppins, Arial, sans-serif" font-size="16" font-weight="500" fill="#5E625F" ><tspan x="120" dy="0">356 registros viven dentro</tspan><tspan x="120" dy="23.2">del catálogo técnico.</tspan></text>

    <path d="M505 555 L571 555" stroke="#214BD9" stroke-width="4" stroke-linecap="round"/><path d="M569 546 L585 555 L569 564" fill="none" stroke="#214BD9" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    <g filter="url(#softShadow)"><rect data-role="deep-surface" x="605" y="345" width="390" height="420" rx="26" fill="#072A4A"/></g>
    <text x="645" y="405" font-family="Poppins, Arial, sans-serif" font-size="16" font-weight="650" fill="#87C1F2" letter-spacing="1.5">GOBIERNO</text>
    <text x="645" y="490" font-family="Poppins, Arial, sans-serif" font-size="28" font-weight="650" fill="#FFFFFF" >Propósito</text><text x="645" y="560" font-family="Poppins, Arial, sans-serif" font-size="28" font-weight="650" fill="#FFFFFF" >Vigencia</text>
    <text x="645" y="630" font-family="Poppins, Arial, sans-serif" font-size="28" font-weight="650" fill="#FFFFFF" >Responsable</text><text x="645" y="700" font-family="Poppins, Arial, sans-serif" font-size="28" font-weight="650" fill="#FFFFFF" >Contradicciones</text>

    <path d="M1010 555 L1076 555" stroke="#F15E4A" stroke-width="4" stroke-linecap="round"/><path d="M1074 546 L1090 555 L1074 564" fill="none" stroke="#F15E4A" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    <g filter="url(#softShadow)"><rect x="1110" y="345" width="410" height="420" rx="26" fill="#FFE1D6"/></g>
    <text x="1150" y="405" font-family="Poppins, Arial, sans-serif" font-size="16" font-weight="650" fill="#A03928" letter-spacing="1.5">CONDUCTA</text>
    <rect x="1150" y="470" width="250" height="42" rx="21" fill="#214BD9"/><text x="1275" y="498" font-family="Poppins, Arial, sans-serif" font-size="15" font-weight="600" fill="#FFFFFF" text-anchor="middle" letter-spacing="1.2">RESPONDER</text><rect x="1150" y="550" width="250" height="42" rx="21" fill="#FF8A4C"/><text x="1275" y="578" font-family="Poppins, Arial, sans-serif" font-size="15" font-weight="600" fill="#FFFFFF" text-anchor="middle" letter-spacing="1.2">ACLARAR</text><rect x="1150" y="630" width="250" height="42" rx="21" fill="#111614"/><text x="1275" y="658" font-family="Poppins, Arial, sans-serif" font-size="15" font-weight="600" fill="#FFFFFF" text-anchor="middle" letter-spacing="1.2">TRANSFERIR</text>
    <text x="1150" y="720" font-family="Poppins, Arial, sans-serif" font-size="16" font-weight="500" fill="#6A2418" ><tspan x="1150" dy="0">La respuesta depende</tspan><tspan x="1150" dy="22.4">de reglas, no del volumen.</tspan></text>


  <!-- Official Efeonce wordmark is composited deterministically during rasterization. -->
</svg>