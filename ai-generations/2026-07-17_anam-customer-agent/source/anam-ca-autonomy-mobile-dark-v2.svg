<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="1600" viewBox="0 0 1200 1600" role="img" aria-labelledby="title desc">
  <title id="title">Anatomía de una conversación mixta</title><desc id="desc">Una consulta de cotización y facturación se separa en dos rutas; el agente aclara y prepara, conserva memoria y transfiere la decisión con contexto.</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%"><feDropShadow dx="0" dy="16" stdDeviation="14" flood-color="#101010" flood-opacity=".14"/></filter>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="160%"><feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#101010" flood-opacity=".10"/></filter>

  </defs>


    <rect x="80" y="70" width="260" height="42" rx="21" fill="#214BD9"/><text x="210" y="98" font-family="Poppins, Arial, sans-serif" font-size="15" font-weight="600" fill="#FFFFFF" text-anchor="middle" letter-spacing="1.2">CONVERSACIÓN MIXTA</text>
    <text x="80" y="165" font-family="Poppins, Arial, sans-serif" font-size="48" font-weight="650" fill="#F7F8FA" ><tspan x="80" dy="0">Una conversación puede</tspan><tspan x="80" dy="53.760000000000005">cambiar de responsable</tspan></text>
    <text x="80" y="300" font-family="Poppins, Arial, sans-serif" font-size="20" font-weight="400" fill="#BEC6CE" >El sistema separa intenciones sin pedirle al cliente que empiece de nuevo.</text>

    <g filter="url(#softShadow)"><rect x="80" y="345" width="1040" height="155" rx="26" fill="#17283C"/></g>
    <text x="125" y="395" font-family="Poppins, Arial, sans-serif" font-size="16" font-weight="650" fill="#214BD9" letter-spacing="1.4">MENSAJE DEL CLIENTE</text>
    <text x="125" y="445" font-family="Poppins, Arial, sans-serif" font-size="24" font-weight="600" fill="#F7F8FA" ><tspan x="125" dy="0">“Necesito cotizar agua potable</tspan><tspan x="125" dy="32.400000000000006">y corregir una factura anterior.”</tspan></text>
    <path d="M600 510 L600 541" stroke="#214BD9" stroke-width="4" stroke-linecap="round"/><path d="M591 539 L600 555 L609 539" fill="none" stroke="#214BD9" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>

    <g filter="url(#softShadow)"><rect x="80" y="575" width="1040" height="245" rx="26" fill="#17283C" stroke="#214BD9" stroke-width="2"/></g>
    <rect x="125" y="610" width="160" height="42" rx="21" fill="#214BD9"/><text x="205" y="638" font-family="Poppins, Arial, sans-serif" font-size="15" font-weight="600" fill="#FFFFFF" text-anchor="middle" letter-spacing="1.2">COTIZACIÓN</text><text x="330" y="640" font-family="Poppins, Arial, sans-serif" font-size="31" font-weight="650" fill="#F7F8FA" >ACLARAR</text>
    <text x="125" y="710" font-family="Poppins, Arial, sans-serif" font-size="20" font-weight="450" fill="#F7F8FA" ><tspan x="125" dy="0">Pregunta matriz, norma y servicio.</tspan><tspan x="125" dy="29">No promete precio ni fecha final.</tspan></text>

    <g filter="url(#softShadow)"><rect x="80" y="855" width="1040" height="245" rx="26" fill="#3A211E" stroke="#F15E4A" stroke-width="2"/></g>
    <rect x="125" y="890" width="160" height="42" rx="21" fill="#F15E4A"/><text x="205" y="918" font-family="Poppins, Arial, sans-serif" font-size="15" font-weight="600" fill="#FFFFFF" text-anchor="middle" letter-spacing="1.2">FACTURA</text><text x="330" y="920" font-family="Poppins, Arial, sans-serif" font-size="31" font-weight="650" fill="#FFC0B2" >PREPARAR</text>
    <text x="125" y="990" font-family="Poppins, Arial, sans-serif" font-size="20" font-weight="450" fill="#FFC0B2" ><tspan x="125" dy="0">Explica lo documentado y reúne referencia.</tspan><tspan x="125" dy="29">No corrige ni confirma una refacturación.</tspan></text>

    <g filter="url(#softShadow)"><rect x="80" y="1135" width="1040" height="150" rx="24" fill="#082D50"/></g>
    <text x="125" y="1180" font-family="Poppins, Arial, sans-serif" font-size="16" font-weight="650" fill="#87C1F2" letter-spacing="1.4">MEMORIA + HANDOFF</text>
    <rect x="125" y="1210" width="175" height="42" rx="21" fill="#214BD9"/><text x="212.5" y="1238" font-family="Poppins, Arial, sans-serif" font-size="15" font-weight="600" fill="#FFFFFF" text-anchor="middle" letter-spacing="1.2">EMPRESA</text><rect x="320" y="1210" width="175" height="42" rx="21" fill="#214BD9"/><text x="407.5" y="1238" font-family="Poppins, Arial, sans-serif" font-size="15" font-weight="600" fill="#FFFFFF" text-anchor="middle" letter-spacing="1.2">SERVICIO</text><rect x="515" y="1210" width="190" height="42" rx="21" fill="#214BD9"/><text x="610" y="1238" font-family="Poppins, Arial, sans-serif" font-size="15" font-weight="600" fill="#FFFFFF" text-anchor="middle" letter-spacing="1.2">REFERENCIA</text><rect x="725" y="1210" width="225" height="42" rx="21" fill="#F15E4A"/><text x="837.5" y="1238" font-family="Poppins, Arial, sans-serif" font-size="15" font-weight="600" fill="#FFFFFF" text-anchor="middle" letter-spacing="1.2">RESUMEN ÚTIL</text>

    <line x1="80" y1="1325" x2="1120" y2="1325" stroke="#F15E4A" stroke-width="4" stroke-dasharray="11 10"/>
    <rect x="80" y="1304" width="170" height="42" rx="21" fill="#F15E4A"/><text x="165" y="1332" font-family="Poppins, Arial, sans-serif" font-size="15" font-weight="600" fill="#FFFFFF" text-anchor="middle" letter-spacing="1.2">FRONTERA</text>
    <path d="M600 1340 L600 1361" stroke="#F15E4A" stroke-width="4" stroke-linecap="round"/><path d="M591 1359 L600 1375 L609 1359" fill="none" stroke="#F15E4A" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    <g filter="url(#softShadow)"><rect x="80" y="1395" width="1040" height="135" rx="26" fill="#2A2D2C"/></g>
    <text x="125" y="1445" font-family="Poppins, Arial, sans-serif" font-size="18" font-weight="650" fill="#F15E4A" letter-spacing="1.3">PERSONA DECIDE</text>
    <text x="125" y="1492" font-family="Poppins, Arial, sans-serif" font-size="22" font-weight="500" fill="#FFFFFF" >Revisa la factura y asume el compromiso.</text>


  <!-- Official Efeonce wordmark is composited deterministically during rasterization. -->
</svg>