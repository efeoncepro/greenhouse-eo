<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000" role="img" aria-labelledby="title desc">
  <title id="title">Arquitectura gobernada de las 23 fuentes</title><desc id="desc">Seis archivos y diecisiete respuestas cortas pasan por reglas de gobierno antes de orientar, aclarar o transferir una consulta.</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%"><feDropShadow dx="0" dy="16" stdDeviation="14" flood-color="#101010" flood-opacity=".14"/></filter>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="160%"><feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#101010" flood-opacity=".10"/></filter>

  </defs>


    <rect x="80" y="70" width="295" height="42" rx="21" fill="#214BD9"/><text x="227.5" y="98" font-family="Poppins, Arial, sans-serif" font-size="15" font-weight="600" fill="#FFFFFF" text-anchor="middle" letter-spacing="1.2">23 FUENTES · 4 CONTROLES</text>
    <text x="80" y="165" font-family="Poppins, Arial, sans-serif" font-size="52" font-weight="650" fill="#F7F8FA" ><tspan x="80" dy="0">De archivos a un contrato de respuesta</tspan></text>
    <text x="80" y="255" font-family="Poppins, Arial, sans-serif" font-size="20" font-weight="400" fill="#BEC6CE" >El volumen no gobierna la respuesta: la gobiernan propósito, vigencia y responsabilidad.</text>

    <g filter="url(#softShadow)"><rect x="80" y="345" width="410" height="420" rx="26" fill="#17283C"/></g>
    <text x="120" y="405" font-family="Poppins, Arial, sans-serif" font-size="16" font-weight="650" fill="#214BD9" letter-spacing="1.5">FUENTES EN USO</text>
    <text x="120" y="500" font-family="Poppins, Arial, sans-serif" font-size="72" font-weight="700" fill="#F7F8FA" >6</text><text x="215" y="480" font-family="Poppins, Arial, sans-serif" font-size="23" font-weight="600" fill="#F7F8FA" >archivos</text>
    <text x="120" y="545" font-family="Poppins, Arial, sans-serif" font-size="15" font-weight="500" fill="#F7F8FA" ><tspan x="120" dy="0">Empresa · servicios · FAQ</tspan><tspan x="120" dy="21.299999999999997">Cotización · seguimiento</tspan><tspan x="120" dy="21.299999999999997">Calidad · catálogo técnico</tspan></text>
    <line x1="120" y1="645" x2="450" y2="645" stroke="#B9C8D8"/>
    <text x="120" y="710" font-family="Poppins, Arial, sans-serif" font-size="54" font-weight="700" fill="#F15E4A" >17</text><text x="225" y="698" font-family="Poppins, Arial, sans-serif" font-size="18" font-weight="600" fill="#FFC0B2" >respuestas cortas</text>
    <text x="120" y="742" font-family="Poppins, Arial, sans-serif" font-size="14" font-weight="500" fill="#BEC6CE" >356 registros ≠ 356 servicios</text>

    <path d="M505 555 L571 555" stroke="#214BD9" stroke-width="4" stroke-linecap="round"/><path d="M569 546 L585 555 L569 564" fill="none" stroke="#214BD9" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    <g filter="url(#softShadow)"><rect data-role="deep-surface" x="605" y="345" width="390" height="420" rx="26" fill="#082D50"/></g>
    <text x="645" y="405" font-family="Poppins, Arial, sans-serif" font-size="16" font-weight="650" fill="#87C1F2" letter-spacing="1.5">GOBIERNO</text>
    <text x="645" y="480" font-family="Poppins, Arial, sans-serif" font-size="22" font-weight="650" fill="#FFFFFF" ><tspan x="645" dy="0">01 · Propósito</tspan><tspan x="645" dy="30.799999999999997">¿Para qué decisión sirve?</tspan></text>
    <text x="645" y="565" font-family="Poppins, Arial, sans-serif" font-size="22" font-weight="650" fill="#FFFFFF" ><tspan x="645" dy="0">02 · Vigencia</tspan><tspan x="645" dy="30.799999999999997">¿Sigue siendo válida?</tspan></text>
    <text x="645" y="650" font-family="Poppins, Arial, sans-serif" font-size="22" font-weight="650" fill="#FFFFFF" ><tspan x="645" dy="0">03 · Responsable</tspan><tspan x="645" dy="30.799999999999997">¿Quién responde por ella?</tspan></text>
    <text x="645" y="735" font-family="Poppins, Arial, sans-serif" font-size="20" font-weight="650" fill="#FFFFFF" >04 · Resolver contradicciones</text>

    <path d="M1010 555 L1076 555" stroke="#F15E4A" stroke-width="4" stroke-linecap="round"/><path d="M1074 546 L1090 555 L1074 564" fill="none" stroke="#F15E4A" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    <g filter="url(#softShadow)"><rect x="1110" y="345" width="410" height="420" rx="26" fill="#3A211E"/></g>
    <text x="1150" y="405" font-family="Poppins, Arial, sans-serif" font-size="16" font-weight="650" fill="#FF9A87" letter-spacing="1.3">CONTRATO DE RESPUESTA</text>
    <rect x="1150" y="460" width="250" height="42" rx="21" fill="#214BD9"/><text x="1275" y="488" font-family="Poppins, Arial, sans-serif" font-size="15" font-weight="600" fill="#FFFFFF" text-anchor="middle" letter-spacing="1.2">RESPONDER</text><text x="1150" y="525" font-family="Poppins, Arial, sans-serif" font-size="15" font-weight="500" fill="#FFC0B2" >Si está documentado</text>
    <rect x="1150" y="555" width="250" height="42" rx="21" fill="#FF8A4C"/><text x="1275" y="583" font-family="Poppins, Arial, sans-serif" font-size="15" font-weight="600" fill="#FFFFFF" text-anchor="middle" letter-spacing="1.2">PREGUNTAR</text><text x="1150" y="620" font-family="Poppins, Arial, sans-serif" font-size="15" font-weight="500" fill="#FFC0B2" >Si falta contexto</text>
    <rect x="1150" y="650" width="250" height="42" rx="21" fill="#2A2D2C"/><text x="1275" y="678" font-family="Poppins, Arial, sans-serif" font-size="15" font-weight="600" fill="#FFFFFF" text-anchor="middle" letter-spacing="1.2">TRANSFERIR</text><text x="1150" y="715" font-family="Poppins, Arial, sans-serif" font-size="15" font-weight="500" fill="#FFC0B2" >Si cambia la responsabilidad</text>
    <text x="1150" y="748" font-family="Poppins, Arial, sans-serif" font-size="14" font-weight="650" fill="#FFC0B2" >Un registro no es una promesa.</text>


